name: Test Windows Nightly

on:
  workflow_dispatch

permissions:
  packages: read

jobs:
   x86_64-windows:
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh

    name: x86-64-pc-windows-msvc
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        # lldb and the mingw-w64 LLVM/clang runtime libraries it imports
        # against. The pinned package set, and why each pin exists, live in
        # the script -- every Windows job that needs lldb calls it, so the
        # pin has one home.
        run: |
          .\.ci-scripts\windows-install-deps.ps1
          python.exe -m pip install --upgrade cloudsmith-cli
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
        run: python .ci-scripts/libs-cache/resolve_libs_cache.py --platform windows-2025-vs2026 --tag $env:LIBS_TAG '--' cmake -DPRESET=libs-windows-x86-64 -DJOBS=4 -P lib/build-libs.cmake
      - name: Configure
        run: cmake --preset windows-x86-64 -DPONY_INSTALL_SYMLINKS=OFF -DPONYC_VERSION=nightly
      - name: Build
        run: cmake --build --preset windows-x86-64-release
      - name: Install
        run: cmake --install build/build --config Release --prefix build\install\release
      - name: Package
        run: Compress-Archive -Path "build\install\release\lib\pony\nightly\bin", "build\install\release\lib\pony\nightly\lib", "build\install\release\lib\pony\nightly\packages" -DestinationPath "build\ponyc-x86-64-pc-windows-msvc.zip" -Force
      - name: Upload
        run: $version = (Get-Date).ToString("yyyyMMdd"); cloudsmith push raw --version $version --api-key ${{ secrets.CLOUDSMITH_API_KEY }} --summary "Pony compiler" --description "https://github.com/ponylang/ponyc" ponylang/nightlies build\ponyc-x86-64-pc-windows-msvc.zip
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

