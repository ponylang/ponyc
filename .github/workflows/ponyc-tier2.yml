name: ponyc Tier 2

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to check out and test (branch, tag, or SHA)"
        required: false
        default: "main"
  schedule:
    - cron: "0 1 * * *"

concurrency:
  group: ponyc-tier2-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0
      - name: Check for recent commits
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          elif git log --since="24 hours ago" --oneline | head -1 | grep -q .; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

  x86_64-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: x86-64 Linux musl alpine3.23
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.24-builder:20260611
            name: x86-64 Linux musl alpine3.24

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Restore libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '-- cmake -DJOBS=4 -P lib/build-libs.cmake') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          cmake --preset x86-64-debug
          cmake --build --preset x86-64-debug
          cmake --build --preset x86-64-debug --target pony-doc-tests pony-lint-tests pony-lsp-tests
      - name: Test with Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -L ci-core
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          cmake --preset x86-64-release
          cmake --build --preset x86-64-release
      - name: Test with Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-release -L ci-core
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -R pony-doc-tests
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -R pony-lint-tests
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -R pony-lsp-tests
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  x86_64-macos:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: macos-15-intel

    name: x86-64 Apple Darwin
    # This runner is slow; give the full-program tests a longer per-program timeout.
    # The value is CI's, set in the environment at run time, not baked into cmake
    # (which defaults it to 60).
    env:
      PONY_FULL_PROGRAM_TIMEOUT: "180"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Restore libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '-- cmake -DJOBS=4 -P lib/build-libs.cmake') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --platform x86-macos-15-intel --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          cmake --preset x86-64-debug
          cmake --build --preset x86-64-debug
          cmake --build --preset x86-64-debug --target pony-doc-tests pony-lint-tests pony-lsp-tests
      - name: Test with Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -L ci-core
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          cmake --preset x86-64-release
          cmake --build --preset x86-64-release
      - name: Test with Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-release -L ci-core
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -R pony-doc-tests
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -R pony-lint-tests
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset x86-64-debug -R pony-lsp-tests
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  # Currently, Github actions supplied by GH like checkout and cache do not work
  # in musl libc environments on arm64. We can work around this by running
  # those actions on the host and then "manually" doing our work that would
  # normally be done "in the musl container" by starting the container ourselves
  # for various steps by invoking docker directly.
  #
  # This is not in line with our standard pattern of "just do it all in the
  # container" but is required to work around the GitHub actions limitation
  # documented above.
  arm64-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
            name: arm64 Linux glibc
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: arm64 Linux musl alpine3.23
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.24-builder:20260611
            name: arm64 Linux musl alpine3.24

    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull Docker image
        run: docker pull ${{ matrix.image }}
      - name: Restore libs
        env:
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '-- cmake -DJOBS=4 -P lib/build-libs.cmake') || '' }}
        run: |
          docker run --rm \
            --user pony \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e GITHUB_REPOSITORY \
            -e GITHUB_ACTOR \
            -e LIBS_IMAGE="${{ matrix.image }}" \
            -e LIBS_TAG="$LIBS_TAG" \
            -e LIBS_MODE="$LIBS_MODE" \
            -e LIBS_BUILD="$LIBS_BUILD" \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            sh -c 'python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" $LIBS_BUILD'
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            bash -c "cmake --preset armv8-a-debug && cmake --build --preset armv8-a-debug && cmake --build --preset armv8-a-debug --target pony-doc-tests pony-lint-tests pony-lsp-tests"
      - name: Test with Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            ctest --preset armv8-a-debug -L ci-core
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            bash -c "cmake --preset armv8-a-release && cmake --build --preset armv8-a-release"
      - name: Test with Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            ctest --preset armv8-a-release -L ci-core
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            ctest --preset armv8-a-debug -R pony-doc-tests
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            ctest --preset armv8-a-debug -R pony-lint-tests
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            ctest --preset armv8-a-debug -R pony-lsp-tests
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  arm64-windows:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: windows-11-arm
    defaults:
      run:
        shell: pwsh

    name: arm64 Windows MSVC
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Restore libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          # PowerShell does not word-split a variable's value, so the two modes are
          # spelled out with literal tokens.
          LIBS_OFF_MAIN: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != 'main' }}
        run: |
          if ($env:LIBS_OFF_MAIN -eq 'true') {
            python .ci-scripts/libs-cache/resolve_libs_cache.py --branch-cache --platform windows-11-arm --tag $env:LIBS_TAG '--' cmake -DPRESET=libs-windows-arm64 -DJOBS=4 -P lib/build-libs.cmake
          } else {
            python .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit --skip-on-miss --platform windows-11-arm --tag $env:LIBS_TAG
          }
      - name: Configure
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: cmake --preset windows-arm64
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          cmake --build --preset windows-arm64-debug
          cmake --build --preset windows-arm64-debug --target pony-doc-tests pony-lint-tests pony-lsp-tests
      - name: Test with Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset windows-arm64-debug -L ci-core
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: cmake --build --preset windows-arm64-release
      - name: Test with Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset windows-arm64-release -L ci-core
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset windows-arm64-debug -R pony-doc-tests
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset windows-arm64-debug -R pony-lint-tests
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: ctest --preset windows-arm64-debug -R pony-lsp-tests
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
