name: "Stress Test: Linux TCP Open/Close"

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: read

# Serialize the scheduled stress loop to one workflow at a time (groups are
# repo-wide, so all six stress workflows share `stress-scheduled`). Manual runs
# get a unique group (github.run_id) so a branch check never queues behind the
# loop. Relies on these workflows having exactly two triggers (schedule +
# workflow_dispatch) -- see the per-event flag/alert conditions below.
concurrency:
  group: stress-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled' }}
  cancel-in-progress: false

jobs:
  x86_64-linux:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-ubuntu24.04-builder:20250115
            name: x86-64-unknown-linux-ubuntu24.04 [release]
            target: test-stress-tcp-open-close-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-ubuntu24.04-builder:20250115
            name: x86-64-unknown-linux-ubuntu24.04 [debug]
            target: test-stress-tcp-open-close-debug
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-ubuntu24.04-builder:20250115
            name: x86-64-unknown-linux-ubuntu24.04 [cd] [release]
            target: test-stress-tcp-open-close-with-cd-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-ubuntu24.04-builder:20250115
            name: x86-64-unknown-linux-ubuntu24.04 [cd] [debug]
            target: test-stress-tcp-open-close-with-cd-debug
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: x86-64-unknown-linux-alpine3.23 [release]
            target: test-stress-tcp-open-close-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: x86-64-unknown-linux-alpine3.23 [debug]
            target: test-stress-tcp-open-close-debug
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: x86-64-unknown-linux-alpine3.23 [cd] [release]
            target: test-stress-tcp-open-close-with-cd-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: x86-64-unknown-linux-alpine3.23 [cd] [debug]
            target: test-stress-tcp-open-close-with-cd-debug
            debugger: lldb

    name: ${{matrix.target}}:${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # schedule -> skip the run on a cache miss (the loop overlaps an empty/
          # refilling cache); manual dispatch -> also pull the branch cache so a
          # branch run finds the libs it already built, and fail loudly otherwise.
          LIBS_CACHE_FLAGS: ${{ github.event_name == 'schedule' && '--skip-on-miss' || '--branch-cache' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit $LIBS_CACHE_FLAGS --image "$LIBS_IMAGE" --tag "$LIBS_TAG"
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=debug
          make build config=debug
      - name: Run Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make ${{ matrix.target }} config=debug usedebugger='${{ matrix.debugger }}'
      - name: Send alert on failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  # Currently, Github actions supplied by GH like checkout and cache do not work
  # in musl libc environments on arm64. We can work around this by running
  # those actions on the host and then "manually" doing our work that would
  # normally be done "in the musl container" by starting the container ourselves
  # for various steps by invoking docker directly.
  #
  # This is not in line with our standard pattern of "just do it all in the
  # container" but is required to work around the GitHub actions limitation
  # documented above.
  arm64-linux:
    runs-on: ubuntu-24.04-arm
    # Run after the x86 job so the whole workflow is never more than 2 cells at
    # once (max-parallel: 2 per matrix); !cancelled() keeps arm64 running even
    # when an x86 cell had a real failure.
    needs: x86_64-linux
    if: ${{ !cancelled() }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-arm64-unknown-linux-ubuntu24.04-builder:20250510
            name: arm64-unknown-linux-ubuntu24.04 [release]
            target: test-stress-tcp-open-close-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-arm64-unknown-linux-ubuntu24.04-builder:20250510
            name: arm64-unknown-linux-ubuntu24.04 [debug]
            target: test-stress-tcp-open-close-debug
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-arm64-unknown-linux-ubuntu24.04-builder:20250510
            name: arm64-unknown-linux-ubuntu24.04 [cd] [release]
            target: test-stress-tcp-open-close-with-cd-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-arm64-unknown-linux-ubuntu24.04-builder:20250510
            name: arm64-unknown-linux-ubuntu24.04 [cd] [debug]
            target: test-stress-tcp-open-close-with-cd-debug
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: arm64-unknown-linux-alpine3.23 [release]
            target: test-stress-tcp-open-close-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: arm64-unknown-linux-alpine3.23 [debug]
            target: test-stress-tcp-open-close-debug
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: arm64-unknown-linux-alpine3.23 [cd] [release]
            target: test-stress-tcp-open-close-with-cd-release
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: arm64-unknown-linux-alpine3.23 [cd] [debug]
            target: test-stress-tcp-open-close-with-cd-debug
            debugger: lldb

    name: ${{matrix.target}}:${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull Docker image
        run: docker pull ${{ matrix.image }}
      - name: Restore prebuilt libs
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # schedule -> skip the run on a cache miss; manual dispatch -> also pull
          # the branch cache so a branch run finds the libs it already built.
          LIBS_CACHE_FLAGS: ${{ github.event_name == 'schedule' && '--skip-on-miss' || '--branch-cache' }}
        run: |
          docker run --rm \
            --user pony \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e GITHUB_REPOSITORY \
            -e GITHUB_ACTOR \
            -e LIBS_IMAGE="${{ matrix.image }}" \
            -e LIBS_TAG="$LIBS_TAG" \
            -e LIBS_CACHE_FLAGS="$LIBS_CACHE_FLAGS" \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            sh -c 'python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit $LIBS_CACHE_FLAGS --image "$LIBS_IMAGE" --tag "$LIBS_TAG"'
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            bash -c "make configure arch=armv8-a config=debug && make build config=debug"
      - name: Run Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          docker run --rm \
            --user pony \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            make ${{ matrix.target }} config=debug usedebugger='${{ matrix.debugger }}'
      - name: Send alert on failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
