name: ponyc Tier 3

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to check out and test (branch, tag, or SHA)"
        required: false
        default: "main"
  schedule:
    - cron: "0 2 * * 1,3,5"

concurrency:
  group: ponyc-tier3-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0
      - name: Check for recent commits
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          # 3 days covers the widest gap between scheduled runs (Fri->Mon)
          # in the Mon/Wed/Fri cadence; revisit this if the schedule changes.
          elif git log --since="3 days ago" --oneline | head -1 | grep -q .; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

  riscv64-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-cross-riscv64:20240427
            name: riscv64 Linux glibc

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- make libs llvm_tools=false build_flags=-j4
      - name: Build Debug Runtime
        run: |
          make configure config=debug use=runtime_tracing
          make build config=debug
      - name: Build Debug Cross-Compiled Runtime
        run: make cross-libponyrt config=debug CC=riscv64-linux-gnu-gcc-10 CXX=riscv64-linux-gnu-g++-10 arch=rv64gc cross_cflags="-march=rv64gc -mtune=rocket" cross_llc_flags="-march=riscv64"
      # net/Broadcast and net/BroadcastReceive are excluded here only: under
      # qemu-riscv64 a datagram sent to the limited-broadcast address is not
      # delivered to a 255.255.255.255-bound socket, so net/BroadcastReceive
      # times out. The other cross legs (arm/armhf) deliver it and keep running
      # both tests. See _TestBroadcastReceive in packages/net/_test.pony.
      - name: Test with Debug Cross-Compiled Runtime
        run: make test-cross-ci config=debug PONYPATH=../rv64gc/debug cross_triple=riscv64-unknown-linux-gnu cross_arch=rv64gc cross_cpu=generic-rv64 cross_sysroot=/usr/riscv64-linux-gnu cross_ponyc_args='--abi=lp64d --features=+m,+a,+f,+d,+c' cross_runner="qemu-riscv64 -L /usr/riscv64-linux-gnu/lib/" stdlib_test_excludes='--exclude=net/Broadcast'
      - name: Build Release Runtime
        run: |
          make configure config=release
          make build config=release
      - name: Build Release Cross-Compiled Runtime
        run: make cross-libponyrt config=release CC=riscv64-linux-gnu-gcc-10 CXX=riscv64-linux-gnu-g++-10 arch=rv64gc cross_cflags="-march=rv64gc -mtune=rocket" cross_llc_flags="-march=riscv64"
      # See the debug step above for why net/Broadcast is excluded on riscv64.
      - name: Test with Release Cross-Compiled Runtime
        run: make test-cross-ci config=release PONYPATH=../rv64gc/release cross_triple=riscv64-unknown-linux-gnu cross_arch=rv64gc cross_cpu=generic-rv64 cross_sysroot=/usr/riscv64-linux-gnu cross_ponyc_args='--abi=lp64d --features=+m,+a,+f,+d,+c' cross_runner="qemu-riscv64 -L /usr/riscv64-linux-gnu/lib/" stdlib_test_excludes='--exclude=net/Broadcast'
      - name: Test pony-doc
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        run: make test-pony-lsp config=debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  arm-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-cross-arm:20250223
            name: arm Linux glibc

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- make libs llvm_tools=false build_flags=-j4
      - name: Build Debug Runtime
        run: |
          make configure config=debug use=runtime_tracing
          make build config=debug
      - name: Build Debug Cross-Compiled Runtime
        run: make cross-libponyrt config=debug CC=arm-linux-gnueabi-gcc CXX=arm-linux-gnueabi-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      - name: Test with Debug Cross-Compiled Runtime
        run: make test-cross-ci config=debug PONYPATH=../armv7-a/debug cross_triple=arm-unknown-linux-gnueabi cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabi/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabi/libc"
      - name: Build Release Runtime
        run: |
          make configure config=release
          make build config=release
      - name: Build Release Cross-Compiled Runtime
        run: make cross-libponyrt config=release CC=arm-linux-gnueabi-gcc CXX=arm-linux-gnueabi-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      - name: Test with Release Cross-Compiled Runtime
        run: make test-cross-ci config=release PONYPATH=../armv7-a/release cross_triple=arm-unknown-linux-gnueabi cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabi/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabi/libc"
      - name: Test pony-doc
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        run: make test-pony-lsp config=debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  armhf-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-cross-armhf:20250223
            name: armhf Linux glibc

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- make libs llvm_tools=false build_flags=-j4
      - name: Build Debug Runtime
        run: |
          make configure config=debug use=runtime_tracing
          make build config=debug
      - name: Build Debug Cross-Compiled Runtime
        run: make cross-libponyrt config=debug CC=arm-linux-gnueabihf-gcc CXX=arm-linux-gnueabihf-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      - name: Test with Debug Cross-Compiled Runtime
        run: make test-cross-ci config=debug PONYPATH=../armv7-a/debug cross_triple=arm-unknown-linux-gnueabihf cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabihf/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabihf/libc"
      - name: Build Release Runtime
        run: |
          make configure config=release
          make build config=release
      - name: Build Release Cross-Compiled Runtime
        run: make cross-libponyrt config=release CC=arm-linux-gnueabihf-gcc CXX=arm-linux-gnueabihf-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      - name: Test with Release Cross-Compiled Runtime
        run: make test-cross-ci config=release PONYPATH=../armv7-a/release cross_triple=arm-unknown-linux-gnueabihf cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabihf/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabihf/libc"
      - name: Test pony-doc
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        run: make test-pony-lsp config=debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  freebsd:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '14.3'
            name: x86-64 FreeBSD 14.3
          - version: '15.0'
            name: x86-64 FreeBSD 15.0

    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          df -h /
      - name: Install QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-utils qemu-system-x86 cloud-image-utils expect
          sudo chmod 666 /dev/kvm
      - name: Download FreeBSD image
        run: |
          curl -L -o freebsd.qcow2.xz \
            "https://download.freebsd.org/releases/VM-IMAGES/${{ matrix.version }}-RELEASE/amd64/Latest/FreeBSD-${{ matrix.version }}-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz"
          xz -d freebsd.qcow2.xz
          qemu-img resize freebsd.qcow2 60G
      - name: Prepare VM access
        run: |
          ssh-keygen -t ed25519 -f vm_key -N ""
          PUB_KEY=$(cat vm_key.pub)

          # nuageinit seed: SSH key for freebsd, set root password for su access
          cat > user-data <<USERDATA
          #cloud-config
          ssh_authorized_keys:
            - ${PUB_KEY}
          chpasswd:
            expire: false
            list:
              - root:ciroot
          USERDATA
          cat > meta-data <<METADATA
          instance-id: freebsd-ci
          local-hostname: freebsd-ci
          METADATA
          cloud-localds seed.img user-data meta-data
      - name: Boot FreeBSD VM
        run: |
          qemu-system-x86_64 \
            -machine pc,accel=kvm \
            -cpu host \
            -smp 4 \
            -m 12G \
            -drive file=freebsd.qcow2,format=qcow2,if=virtio \
            -drive file=seed.img,format=raw,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -display none \
            -daemonize
      - name: Wait for VM
        run: |
          timeout 300 bash -c '
            while ! ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 -i vm_key -p 2222 freebsd@localhost true 2>/dev/null; do
              sleep 2
            done
          '
          echo "SSH available"
      - name: Install build dependencies
        run: |
          export PUB_KEY=$(cat vm_key.pub)
          expect <<'EXPECT'
          set timeout 600
          spawn ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 -t freebsd@localhost su -m root
          expect {
            "Password:" { send "ciroot\r" }
            timeout { puts "Timeout waiting for password prompt"; exit 1 }
          }
          expect {
            "#" {}
            "su: Sorry" { puts "su failed - wrong password or nuageinit didn't set it"; exit 1 }
            timeout { puts "Timeout waiting for root shell"; exit 1 }
          }
          send "pkg install -y cmake gmake libunwind git python3 rsync doas\r"
          expect {
            "#" {}
            timeout { puts "Timeout during pkg install"; exit 1 }
          }
          # Let the freebsd user load the dtrace kernel module and run dtrace
          # non-interactively for the use=dtrace probe-firing smoke test.
          send "echo 'permit nopass freebsd' > /usr/local/etc/doas.conf\r"
          expect {
            "#" {}
            timeout { puts "Timeout writing doas.conf"; exit 1 }
          }
          send "exit\r"
          expect eof
          EXPECT
      - name: Copy source to VM
        run: |
          rsync -az -e "ssh -o StrictHostKeyChecking=no -i vm_key -p 2222" \
            "$GITHUB_WORKSPACE/" freebsd@localhost:/home/freebsd/ponyc/
      - name: Restore or build libs
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 freebsd@localhost \
            "cd /home/freebsd/ponyc && export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' && python3 .ci-scripts/libs-cache/resolve_libs_cache.py --platform freebsd-${{ matrix.version }} --tag '${LIBS_TAG}' -- gmake libs llvm_tools=false build_flags=-j4"
      - name: Build and test
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 freebsd@localhost <<'EOF'
          set -e
          cd /home/freebsd/ponyc
          gmake configure config=debug use=runtime_tracing
          gmake build config=debug
          # Smoke-test the --static embedded-LLD link path; the test targets
          # below only exercise dynamic linking. Covers actor init plus
          # exception unwinding through the static recipe.
          mkdir -p /tmp/static-smoke
          printf 'actor Main\n  new create(env: Env) =>\n    try error else env.out.print("static ok") end\n' > /tmp/static-smoke/main.pony
          PONYPATH="$PWD/packages" ./build/debug/ponyc --static -o /tmp/static-smoke /tmp/static-smoke
          file /tmp/static-smoke/static-smoke | grep -q 'statically linked'
          /tmp/static-smoke/static-smoke
          gmake test-ci-core config=debug flight_recorder_ci=yes
          gmake test-pony-doc config=debug
          gmake test-pony-lint config=debug
          gmake test-pony-lsp config=debug
          gmake configure config=release use=runtime_tracing
          gmake build config=release
          gmake test-ci-core config=release flight_recorder_ci=yes
          # native sanitizer link smoke test — see the script for details. Runs
          # before the dtrace smoke: both clean and reconfigure the debug build,
          # so the order is deliberate.
          sh .ci-scripts/freebsd-sanitizer-smoke.sh
          # use=dtrace smoke test — see the script for details.
          sh .ci-scripts/freebsd-dtrace-smoke.sh
          EOF
      - name: Shutdown VM
        if: always()
        run: |
          pkill -f qemu-system-x86 || true
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  openbsd:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    name: x86-64 OpenBSD 7.9
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          df -h /
      - name: Install QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-utils qemu-system-x86 genisoimage
          sudo chmod 666 /dev/kvm
      - name: Download OpenBSD image
        run: |
          curl -L -o openbsd.qcow2 \
            "https://github.com/hcartiaux/openbsd-cloud-image/releases/download/v7.9_2026-06-03-20-46/openbsd-generic.qcow2"
          # Build-workspace disk. OpenBSD's default disklabel confines the
          # build to /home (~10.8G), which the LLVM 22 build overflows, so
          # build on a dedicated disk instead, mirroring the DragonFly job.
          qemu-img create -f qcow2 openbsd-data.qcow2 50G
      - name: Prepare VM access
        run: |
          ssh-keygen -t ed25519 -f vm_key -N ""
          PUB_KEY=$(cat vm_key.pub)

          cat > user-data <<USERDATA
          #cloud-config
          users:
          - name: openbsd
            groups: wheel
            ssh_authorized_keys:
            - ${PUB_KEY}
          write_files:
          - path: /etc/doas.conf
            content: |
              permit nopass keepenv :wheel
            owner: root:wheel
            permissions: '0600'
          USERDATA
          cat > meta-data <<METADATA
          instance-id: openbsd-ci
          local-hostname: openbsd-ci
          METADATA
          genisoimage -output seed.iso -volid cidata -joliet -rock user-data meta-data
      - name: Boot OpenBSD VM
        run: |
          qemu-system-x86_64 \
            -machine pc,accel=kvm \
            -cpu host \
            -smp 4 \
            -m 6G \
            -drive file=openbsd.qcow2,format=qcow2,if=virtio \
            -drive file=openbsd-data.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,media=cdrom \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -display none \
            -daemonize
      - name: Wait for VM
        run: |
          timeout 300 bash -c '
            while ! ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 -i vm_key -p 2222 openbsd@localhost true 2>/dev/null; do
              sleep 2
            done
          '
          echo "SSH available"
      - name: Set up build disk
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 openbsd@localhost <<'EOF'
          set -e
          # The image disk confines builds to /home (~10.8G). Build on the
          # dedicated second disk (sd1) instead: one 4.2BSD partition spanning
          # the disk, newfs'd and mounted at /build.
          printf 'a a\n\n\n\nw\nq\n' | doas disklabel -E sd1
          doas newfs /dev/rsd1a
          doas mkdir -p /build
          doas mount /dev/sd1a /build
          doas chown openbsd:wheel /build
          EOF
      - name: Install build dependencies
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 openbsd@localhost \
            "doas pkg_add -u && doas pkg_add cmake gmake git python%3 rsync--"
      - name: Raise datasize limit
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 openbsd@localhost \
            "doas sed -i 's/datasize-max=1536M/datasize-max=4096M/' /etc/login.conf && doas sed -i 's/datasize-cur=1536M/datasize-cur=4096M/' /etc/login.conf"
      - name: Copy source to VM
        run: |
          rsync -az -e "ssh -o StrictHostKeyChecking=no -i vm_key -p 2222" \
            "$GITHUB_WORKSPACE/" openbsd@localhost:/build/ponyc/
      - name: Assert unsupported build options are rejected
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 openbsd@localhost \
            "cd /build/ponyc && sh .ci-scripts/openbsd-reject-unsupported-builds.sh"
      - name: Restore or build libs
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 openbsd@localhost \
            "cd /build/ponyc && export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' && python3 .ci-scripts/libs-cache/resolve_libs_cache.py --platform openbsd-7.9 --tag '${LIBS_TAG}' -- gmake libs llvm_tools=false build_flags=-j4 && rm -rf build/build_libs"
      - name: Build and test
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 openbsd@localhost <<'EOF'
          set -e
          cd /build/ponyc
          df -h
          gmake configure config=debug use=runtime_tracing
          gmake build config=debug
          # Smoke-test the --static embedded-LLD link path; the test
          # targets below only exercise dynamic linking. Covers actor init
          # plus exception unwinding through the static recipe. OpenBSD
          # static is static-PIE (rcrt0.o startup), so the binary's `file`
          # output is "ELF 64-bit LSB shared object" — confirm via
          # `readelf -d` showing zero DT_NEEDED entries instead. The
          # readelf invocation runs under set -e so any failure of the
          # command propagates; `! ... | grep -q '(NEEDED)'` asserts the
          # absence rather than a count of zero (which is what a failing
          # readelf would also produce).
          mkdir -p /tmp/static-smoke
          printf 'actor Main\n  new create(env: Env) =>\n    try error else env.out.print("static ok") end\n' > /tmp/static-smoke/main.pony
          PONYPATH="$PWD/packages" ./build/debug/ponyc --static -o /tmp/static-smoke /tmp/static-smoke
          ! readelf -d /tmp/static-smoke/static-smoke | grep -q '(NEEDED)'
          /tmp/static-smoke/static-smoke | grep -q 'static ok'
          gmake test-ci-core config=debug flight_recorder_ci=yes
          gmake test-pony-doc config=debug
          gmake test-pony-lint config=debug
          gmake test-pony-lsp config=debug
          gmake configure config=release use=runtime_tracing
          gmake build config=release
          gmake test-ci-core config=release flight_recorder_ci=yes
          EOF
      - name: Shutdown VM
        if: always()
        run: |
          pkill -f qemu-system-x86 || true
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  dragonflybsd:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    name: x86-64 DragonFly BSD 6.4.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          df -h /
      - name: Install QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-utils qemu-system-x86
          sudo chmod 666 /dev/kvm
      - name: Download DragonFly BSD image
        run: |
          curl -L -o dfly.img.bz2 \
            "https://mirror-master.dragonflybsd.org/iso-images/dfly-x86_64-6.4.2_REL.img.bz2"
          bunzip2 dfly.img.bz2
          qemu-img convert -f raw -O qcow2 dfly.img dfly.qcow2
          rm dfly.img
          qemu-img resize dfly.qcow2 60G
          # Second disk for build workspace (root partition is only ~1.8GB)
          qemu-img create -f qcow2 dfly-data.qcow2 50G
      - name: Download DragonFly BSD ISO
        run: |
          # The raw image lacks /usr/include (system headers). Extract
          # them from the ISO which contains the full base system.
          curl -L -o dfly.iso.bz2 \
            "https://mirror-master.dragonflybsd.org/iso-images/dfly-x86_64-6.4.2_REL.iso.bz2"
          bunzip2 dfly.iso.bz2
          mkdir -p dfly-iso
          sudo mount -o loop,ro dfly.iso dfly-iso
          tar cf dfly-include.tar -C dfly-iso/usr include
          sudo umount dfly-iso
          rm dfly.iso
      - name: Prepare VM access
        run: |
          ssh-keygen -t ed25519 -f vm_key -N ""
      - name: Boot DragonFly BSD VM
        run: |
          qemu-system-x86_64 \
            -machine pc,accel=kvm \
            -cpu host \
            -smp 4 \
            -m 12G \
            -drive file=dfly.qcow2,format=qcow2,if=virtio \
            -drive file=dfly-data.qcow2,format=qcow2,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -object rng-random,id=rng0,filename=/dev/urandom \
            -device virtio-rng-pci,rng=rng0 \
            -monitor unix:dfly-monitor.sock,server,nowait \
            -display none \
            -daemonize
      - name: Configure VM
        run: |
          PUB_KEY=$(cat vm_key.pub)

          # Wait for the VM to boot
          sleep 90

          # DragonFly BSD raw images boot to a login prompt with root
          # having no password and no cloud-init support. Use QEMU
          # monitor sendkey to type commands into the VGA console.
          python3 <<PYEOF
          import socket, time

          KEYMAP = {
              ' ': 'spc', '\n': 'ret', '-': 'minus', '=': 'equal',
              '/': 'slash', '.': 'dot', ',': 'comma', ';': 'semicolon',
              "'": 'apostrophe', '\\\\': 'backslash', '\`': 'grave_accent',
              '[': 'bracket_left', ']': 'bracket_right',
              '_': 'shift-minus', '+': 'shift-equal', ':': 'shift-semicolon',
              '"': 'shift-apostrophe', '<': 'shift-comma', '>': 'shift-dot',
              '?': 'shift-slash', '{': 'shift-bracket_left', '}': 'shift-bracket_right',
              '|': 'shift-backslash', '~': 'shift-grave_accent',
              '!': 'shift-1', '@': 'shift-2', '#': 'shift-3', '\$': 'shift-4',
              '%': 'shift-5', '^': 'shift-6', '&': 'shift-7', '*': 'shift-8',
              '(': 'shift-9', ')': 'shift-0',
          }

          def send_hmp(sock, cmd):
              sock.sendall((cmd + '\n').encode())
              time.sleep(0.1)
              sock.settimeout(0.3)
              try: sock.recv(4096)
              except socket.timeout: pass
              sock.settimeout(None)

          def send_line(sock, text):
              for ch in text + '\n':
                  if ch in KEYMAP: key = KEYMAP[ch]
                  elif ch.isalpha(): key = f'shift-{ch.lower()}' if ch.isupper() else ch
                  elif ch.isdigit(): key = ch
                  else: continue
                  send_hmp(sock, f'sendkey {key}')
                  time.sleep(0.03)

          sock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
          sock.connect('dfly-monitor.sock')
          time.sleep(0.5)
          sock.recv(4096)

          # Press enter and login as root (no password)
          send_line(sock, '')
          time.sleep(2)
          send_line(sock, 'root')
          time.sleep(3)

          # Configure network
          send_line(sock, 'dhclient vtnet0')
          time.sleep(15)

          # Configure sshd
          send_line(sock, 'echo "PermitRootLogin yes" >> /etc/ssh/sshd_config')
          time.sleep(0.5)
          send_line(sock, 'echo "PermitEmptyPasswords yes" >> /etc/ssh/sshd_config')
          time.sleep(0.5)

          # Install SSH key
          send_line(sock, 'mkdir -p /root/.ssh && chmod 700 /root/.ssh')
          time.sleep(0.5)
          send_line(sock, 'echo "${PUB_KEY}" > /root/.ssh/authorized_keys')
          time.sleep(0.5)
          send_line(sock, 'chmod 600 /root/.ssh/authorized_keys')
          time.sleep(0.5)

          # Generate host keys (virtio-rng provides entropy) and start sshd
          send_line(sock, 'ssh-keygen -A')
          time.sleep(10)
          send_line(sock, '/usr/sbin/sshd')
          time.sleep(3)

          # Format and mount build disk
          send_line(sock, 'newfs /dev/vbd1')
          time.sleep(10)
          send_line(sock, 'mkdir -p /build && mount /dev/vbd1 /build')
          time.sleep(2)

          sock.close()
          PYEOF
      - name: Wait for VM
        run: |
          timeout 300 bash -c '
            while ! ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 -i vm_key -p 2222 root@localhost true 2>/dev/null; do
              sleep 2
            done
          '
          echo "SSH available"
      - name: Install build dependencies
        run: |
          # Move /usr/local to /build disk before installing packages.
          # The root partition is only ~1.8GB and gcc13 alone needs 418MB.
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 root@localhost /bin/sh <<'EOF'
          set -e
          cpdup /usr/local /build/usr_local
          rm -rf /usr/local
          ln -s /build/usr_local /usr/local
          EOF

          # Install system headers from ISO (raw image ships without /usr/include)
          scp -o StrictHostKeyChecking=no -i vm_key -P 2222 \
            dfly-include.tar root@localhost:/build/
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 root@localhost /bin/sh <<'EOF'
          set -e
          tar xf /build/dfly-include.tar -C /build
          ln -s /build/include /usr/include
          rm /build/dfly-include.tar
          EOF

          # Install packages (now goes to /build disk via symlink)
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 root@localhost /bin/sh <<'EOF'
          set -e
          pkg install -y cmake gmake git python3 cxx_atomics rsync gcc13 ca_root_nss
          pkg clean -ay
          git config --global --add safe.directory /build/ponyc
          EOF
      - name: Copy source to VM
        run: |
          rsync -az -e "ssh -o StrictHostKeyChecking=no -i vm_key -p 2222" \
            "$GITHUB_WORKSPACE/" root@localhost:/build/ponyc/
      - name: Assert unsupported build options are rejected
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 root@localhost /bin/sh <<'EOF'
          set -e
          cd /build/ponyc
          sh .ci-scripts/dragonfly-reject-unsupported-builds.sh
          EOF
      - name: Restore or build libs
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 root@localhost /bin/sh <<EOF
          set -e
          cd /build/ponyc
          export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' CC=/usr/local/bin/gcc13 CXX=/usr/local/bin/g++13 LD_LIBRARY_PATH=/usr/local/lib/gcc13 SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt
          python3 .ci-scripts/libs-cache/resolve_libs_cache.py --platform dragonfly-6.4.2 --tag '${LIBS_TAG}' -- gmake libs llvm_tools=false build_flags=-j4
          rm -rf build/build_libs
          EOF
      - name: Build and test
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 root@localhost /bin/sh <<'EOF'
          set -e
          export CC=/usr/local/bin/gcc13
          export CXX=/usr/local/bin/g++13
          export LD_LIBRARY_PATH=/usr/local/lib/gcc13
          export SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt
          cd /build/ponyc
          gmake configure config=debug use=runtime_tracing
          gmake build config=debug
          # Smoke-test the --static embedded-LLD link path; the test targets
          # below only exercise dynamic linking. Covers actor init plus
          # exception unwinding through DragonFly's static recipe (no
          # crtbeginT.o, pkg-gcc CRT directory resolution).
          mkdir -p /build/static-smoke
          printf 'actor Main\n  new create(env: Env) =>\n    try error else env.out.print("static ok") end\n' > /build/static-smoke/main.pony
          PONYPATH="$PWD/packages" ./build/debug/ponyc --static -o /build/static-smoke /build/static-smoke
          file /build/static-smoke/static-smoke | grep -q 'statically linked'
          /build/static-smoke/static-smoke
          gmake test-ci-core config=debug flight_recorder_ci=yes
          gmake test-pony-doc config=debug
          gmake test-pony-lint config=debug
          gmake test-pony-lsp config=debug
          gmake configure config=release use=runtime_tracing
          gmake build config=release
          gmake test-ci-core config=release flight_recorder_ci=yes
          EOF
      - name: Shutdown VM
        if: always()
        run: |
          pkill -f qemu-system-x86 || true
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
