name: ponyc Tier 3

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to check out and test (branch, tag, or SHA)"
        required: false
        default: "main"
  schedule:
    - cron: "0 2 * * 1,3,5"

concurrency:
  group: ponyc-tier3-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0
      - name: Check for recent commits
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          # 3 days covers the widest gap between scheduled runs (Fri->Mon)
          # in the Mon/Wed/Fri cadence; revisit this if the schedule changes.
          elif git log --since="3 days ago" --oneline | head -1 | grep -q .; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

  x86_64-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-fedora44-builder:20260614
            name: x86-64 Linux glibc rpm

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Restore libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '-- make libs llvm_tools=false build_flags=-j4') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure arch=x86-64 config=debug
          make build config=debug
      - name: Test with Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-ci-core config=debug
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure arch=x86-64 config=release
          make build config=release
      - name: Test with Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-ci-core config=release
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lsp config=debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  riscv64-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-cross-riscv64:20240427
            name: riscv64 Linux glibc

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Restore libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '-- make libs llvm_tools=false build_flags=-j4') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=debug
          make build config=debug
      - name: Build Debug Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make cross-libponyrt config=debug CC=riscv64-linux-gnu-gcc-10 CXX=riscv64-linux-gnu-g++-10 arch=rv64gc cross_cflags="-march=rv64gc -mtune=rocket" cross_llc_flags="-march=riscv64"
      # net/ tests are excluded on the qemu-user cross legs. User-mode emulation
      # translates instructions faithfully -- so codegen is still exercised --
      # but does not faithfully emulate the kernel: e.g. setsockopt
      # IP_MULTICAST_IF returns ENOPROTOOPT, which no real kernel does, so the
      # multicast round trip times out. net tests here validate qemu, not ponyc.
      # The net code is architecture-independent and is tested against real
      # kernels on x86, arm64 macOS, and the BSD VMs.
      - name: Test with Debug Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-cross-ci config=debug PONYPATH=../rv64gc/debug cross_triple=riscv64-unknown-linux-gnu cross_arch=rv64gc cross_cpu=generic-rv64 cross_sysroot=/usr/riscv64-linux-gnu cross_ponyc_args='--abi=lp64d --features=+m,+a,+f,+d,+c' cross_runner="qemu-riscv64 -L /usr/riscv64-linux-gnu/lib/" stdlib_test_excludes='--exclude=net/'
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=release
          make build config=release
      - name: Build Release Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make cross-libponyrt config=release CC=riscv64-linux-gnu-gcc-10 CXX=riscv64-linux-gnu-g++-10 arch=rv64gc cross_cflags="-march=rv64gc -mtune=rocket" cross_llc_flags="-march=riscv64"
      # See the debug step above for why net/ tests are excluded under qemu-user.
      - name: Test with Release Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-cross-ci config=release PONYPATH=../rv64gc/release cross_triple=riscv64-unknown-linux-gnu cross_arch=rv64gc cross_cpu=generic-rv64 cross_sysroot=/usr/riscv64-linux-gnu cross_ponyc_args='--abi=lp64d --features=+m,+a,+f,+d,+c' cross_runner="qemu-riscv64 -L /usr/riscv64-linux-gnu/lib/" stdlib_test_excludes='--exclude=net/'
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lsp config=debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  arm-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-cross-arm:20250223
            name: arm Linux glibc

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Restore libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '-- make libs llvm_tools=false build_flags=-j4') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=debug
          make build config=debug
      - name: Build Debug Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make cross-libponyrt config=debug CC=arm-linux-gnueabi-gcc CXX=arm-linux-gnueabi-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      # net/ tests are excluded under qemu-user; see the riscv64 leg above.
      - name: Test with Debug Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-cross-ci config=debug PONYPATH=../armv7-a/debug cross_triple=arm-unknown-linux-gnueabi cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabi/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabi/libc" stdlib_test_excludes='--exclude=net/'
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=release
          make build config=release
      - name: Build Release Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make cross-libponyrt config=release CC=arm-linux-gnueabi-gcc CXX=arm-linux-gnueabi-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      # net/ tests are excluded under qemu-user; see the riscv64 leg above.
      - name: Test with Release Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-cross-ci config=release PONYPATH=../armv7-a/release cross_triple=arm-unknown-linux-gnueabi cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabi/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabi/libc" stdlib_test_excludes='--exclude=net/'
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lsp config=debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  armhf-linux:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-cross-armhf:20250223
            name: armhf Linux glibc

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Restore libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && inputs.ref != 'main') && '-- make libs llvm_tools=false build_flags=-j4') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=debug
          make build config=debug
      - name: Build Debug Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make cross-libponyrt config=debug CC=arm-linux-gnueabihf-gcc CXX=arm-linux-gnueabihf-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      # net/ tests are excluded under qemu-user; see the riscv64 leg above.
      - name: Test with Debug Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-cross-ci config=debug PONYPATH=../armv7-a/debug cross_triple=arm-unknown-linux-gnueabihf cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabihf/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabihf/libc" stdlib_test_excludes='--exclude=net/'
      - name: Build Release Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=release
          make build config=release
      - name: Build Release Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make cross-libponyrt config=release CC=arm-linux-gnueabihf-gcc CXX=arm-linux-gnueabihf-g++ arch=armv7-a cross_cflags="-march=armv7-a -mtune=cortex-a9" cross_llc_flags="-O3;-march=arm"
      # net/ tests are excluded under qemu-user; see the riscv64 leg above.
      - name: Test with Release Cross-Compiled Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-cross-ci config=release PONYPATH=../armv7-a/release cross_triple=arm-unknown-linux-gnueabihf cross_arch=armv7-a cross_cpu=cortex-a9 cross_sysroot=/usr/local/arm-linux-gnueabihf/libc cross_ponyc_args='' cross_runner="qemu-arm-static -cpu cortex-a9 -L /usr/local/arm-linux-gnueabihf/libc" stdlib_test_excludes='--exclude=net/'
      - name: Test pony-doc
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make test-pony-lsp config=debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  freebsd:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    name: x86-64 FreeBSD 15.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Check libs cache
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          # The libs live in the VM but the .libs-cache-miss marker and its gate
          # live on the host, so the decision has to happen here, before the VM
          # boots. Off main (a manual dispatch of a branch): build LLVM in the VM if
          # it isn't cached (hit=false; the "Build libs" step pushes it). On main (a
          # scheduled run, or a dispatch left on main): if it isn't cached, write
          # the marker and skip -- we don't build LLVM on main.
          if python3 .ci-scripts/libs-cache/oci_libs_cache.py exists --platform freebsd-15.1 --tag "$LIBS_TAG"; then
            echo "Libs present in the main GHCR cache."
            echo "hit=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.ref }}" != "main" ]; then
            if python3 .ci-scripts/libs-cache/branch_libs_cache.py exists --platform freebsd-15.1 --tag "$LIBS_TAG"; then
              echo "Libs present in the branch GHCR cache."
              echo "hit=true" >> "$GITHUB_OUTPUT"
            else
              echo "Off-main manual run, cache miss; the VM will build LLVM."
              echo "hit=false" >> "$GITHUB_OUTPUT"
            fi
          else
            touch .libs-cache-miss
            echo "::notice::FreeBSD libs cache miss (tag $LIBS_TAG) on a main run; skipping this tier-3 run. The warmer refills it on the next push to main."
          fi
      - name: Provision VM
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        env:
          FREEBSD_VERSION: '15.1'
        run: bash .ci-scripts/bsd/freebsd-provision.bash
      - name: Restore libs
        if: ${{ hashFiles('.libs-cache-miss') == '' && steps.check.outputs.hit == 'true' }}
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 freebsd@localhost \
            "cd /home/freebsd/ponyc && export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' GITHUB_ACTOR='${{ github.actor }}' && python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit --branch-cache --platform freebsd-15.1 --tag '${LIBS_TAG}'"
      - name: Build libs
        if: ${{ hashFiles('.libs-cache-miss') == '' && steps.check.outputs.hit == 'false' }}
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          # When off main and the libs aren't cached, build LLVM in the VM (hours)
          # and push it to the branch cache, so a re-dispatch reuses the build.
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 freebsd@localhost \
            "cd /home/freebsd/ponyc && export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' GITHUB_ACTOR='${{ github.actor }}' && gmake libs llvm_tools=false build_flags=-j4 && { python3 .ci-scripts/libs-cache/branch_libs_cache.py push --platform freebsd-15.1 --tag '${LIBS_TAG}' || echo '::warning::freebsd branch libs cache push failed, will rebuild next run'; }"
      - name: Build and test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 freebsd@localhost <<'EOF'
          set -e
          cd /home/freebsd/ponyc
          gmake configure config=debug
          gmake build config=debug
          # Smoke-test the --static embedded-LLD link path; the test targets
          # below only exercise dynamic linking. Covers actor init plus
          # exception unwinding through the static recipe.
          mkdir -p /tmp/static-smoke
          printf 'actor Main\n  new create(env: Env) =>\n    try error else env.out.print("static ok") end\n' > /tmp/static-smoke/main.pony
          PONYPATH="$PWD/packages" ./build/debug/ponyc --static -o /tmp/static-smoke /tmp/static-smoke
          file /tmp/static-smoke/static-smoke | grep -q 'statically linked'
          /tmp/static-smoke/static-smoke
          gmake test-ci-core config=debug
          gmake test-pony-doc config=debug
          gmake test-pony-lint config=debug
          gmake test-pony-lsp config=debug
          gmake configure config=release
          gmake build config=release
          gmake test-ci-core config=release
          # native sanitizer link smoke test — see the script for details. Runs
          # before the dtrace smoke: both clean and reconfigure the debug build,
          # so the order is deliberate.
          sh .ci-scripts/freebsd-sanitizer-smoke.sh
          # use=dtrace smoke test — see the script for details.
          sh .ci-scripts/freebsd-dtrace-smoke.sh
          # use=coverage smoke test — see the script for details. Runs last of
          # the smokes in this step; it does the same clean+reconfigure of the
          # debug build as the smokes above. (The use=valgrind smoke runs after,
          # in its own step; the script does its own clean+configure+build.)
          sh .ci-scripts/freebsd-coverage-smoke.sh
          EOF
      - name: Valgrind smoke
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        # use=valgrind smoke — see the script for details. FreeBSD ships a modern
        # Valgrind, so unlike DragonFly a Pony program can run to completion under
        # it. Whether 15.1's Valgrind actually does is unverified; this runs it
        # and we find out when tier-3 runs. Its own step because the script does
        # its own clean+configure+build, so it's self-contained.
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 freebsd@localhost <<'EOF'
          set -e
          cd /home/freebsd/ponyc
          sh .ci-scripts/freebsd-valgrind-smoke.sh
          EOF
      - name: Shutdown VM
        if: ${{ always() && hashFiles('.libs-cache-miss') == '' }}
        run: |
          pkill -f qemu-system-x86 || true
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  openbsd:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    name: x86-64 OpenBSD 7.9
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Check libs cache
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          # The libs live in the VM but the .libs-cache-miss marker and its gate
          # live on the host, so the decision has to happen here, before the VM
          # boots. Off main (a manual dispatch of a branch): build LLVM in the VM if
          # it isn't cached (hit=false; the "Build libs" step pushes it). On main (a
          # scheduled run, or a dispatch left on main): if it isn't cached, write
          # the marker and skip -- we don't build LLVM on main.
          if python3 .ci-scripts/libs-cache/oci_libs_cache.py exists --platform openbsd-7.9 --tag "$LIBS_TAG"; then
            echo "Libs present in the main GHCR cache."
            echo "hit=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.ref }}" != "main" ]; then
            if python3 .ci-scripts/libs-cache/branch_libs_cache.py exists --platform openbsd-7.9 --tag "$LIBS_TAG"; then
              echo "Libs present in the branch GHCR cache."
              echo "hit=true" >> "$GITHUB_OUTPUT"
            else
              echo "Off-main manual run, cache miss; the VM will build LLVM."
              echo "hit=false" >> "$GITHUB_OUTPUT"
            fi
          else
            touch .libs-cache-miss
            echo "::notice::OpenBSD libs cache miss (tag $LIBS_TAG) on a main run; skipping this tier-3 run. The warmer refills it on the next push to main."
          fi
      - name: Provision VM
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: bash .ci-scripts/bsd/openbsd-provision.bash
      - name: Assert unsupported build options are rejected
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 openbsd@localhost \
            "cd /build/ponyc && sh .ci-scripts/openbsd-reject-unsupported-builds.sh"
      - name: Restore libs
        if: ${{ hashFiles('.libs-cache-miss') == '' && steps.check.outputs.hit == 'true' }}
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 openbsd@localhost \
            "cd /build/ponyc && export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' GITHUB_ACTOR='${{ github.actor }}' && python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit --branch-cache --platform openbsd-7.9 --tag '${LIBS_TAG}'"
      - name: Build libs
        if: ${{ hashFiles('.libs-cache-miss') == '' && steps.check.outputs.hit == 'false' }}
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          # When off main and the libs aren't cached, build LLVM in the VM (hours)
          # and push it to the branch cache, so a re-dispatch reuses the build. rm
          # build/build_libs first to free the VM's /build disk before the test
          # build.
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 openbsd@localhost \
            "cd /build/ponyc && export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' GITHUB_ACTOR='${{ github.actor }}' && gmake libs llvm_tools=false build_flags=-j4 && rm -rf build/build_libs && { python3 .ci-scripts/libs-cache/branch_libs_cache.py push --platform openbsd-7.9 --tag '${LIBS_TAG}' || echo '::warning::openbsd branch libs cache push failed, will rebuild next run'; }"
      - name: Build and test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 openbsd@localhost <<'EOF'
          set -e
          cd /build/ponyc
          df -h
          gmake configure config=debug
          gmake build config=debug
          # Smoke-test the --static embedded-LLD link path; the test
          # targets below only exercise dynamic linking. Covers actor init
          # plus exception unwinding through the static recipe. OpenBSD
          # static is static-PIE (rcrt0.o startup), so the binary's `file`
          # output is "ELF 64-bit LSB shared object" — confirm via
          # `readelf -d` showing zero DT_NEEDED entries instead. The
          # readelf invocation runs under set -e so any failure of the
          # command propagates; `! ... | grep -q '(NEEDED)'` asserts the
          # absence rather than a count of zero (which is what a failing
          # readelf would also produce).
          mkdir -p /tmp/static-smoke
          printf 'actor Main\n  new create(env: Env) =>\n    try error else env.out.print("static ok") end\n' > /tmp/static-smoke/main.pony
          PONYPATH="$PWD/packages" ./build/debug/ponyc --static -o /tmp/static-smoke /tmp/static-smoke
          ! readelf -d /tmp/static-smoke/static-smoke | grep -q '(NEEDED)'
          /tmp/static-smoke/static-smoke | grep -q 'static ok'
          gmake test-ci-core config=debug
          gmake test-pony-doc config=debug
          gmake test-pony-lint config=debug
          gmake test-pony-lsp config=debug
          gmake configure config=release
          gmake build config=release
          gmake test-ci-core config=release
          EOF
      - name: Shutdown VM
        if: ${{ always() && hashFiles('.libs-cache-miss') == '' }}
        run: |
          pkill -f qemu-system-x86 || true
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  dragonflybsd:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    name: x86-64 DragonFly BSD 6.4.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Check libs cache
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          # The libs live in the VM but the .libs-cache-miss marker and its gate
          # live on the host, so the decision has to happen here, before the VM
          # boots. Off main (a manual dispatch of a branch): build LLVM in the VM if
          # it isn't cached (hit=false; the "Build libs" step pushes it). On main (a
          # scheduled run, or a dispatch left on main): if it isn't cached, write
          # the marker and skip -- we don't build LLVM on main.
          if python3 .ci-scripts/libs-cache/oci_libs_cache.py exists --platform dragonfly-6.4.2 --tag "$LIBS_TAG"; then
            echo "Libs present in the main GHCR cache."
            echo "hit=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.ref }}" != "main" ]; then
            if python3 .ci-scripts/libs-cache/branch_libs_cache.py exists --platform dragonfly-6.4.2 --tag "$LIBS_TAG"; then
              echo "Libs present in the branch GHCR cache."
              echo "hit=true" >> "$GITHUB_OUTPUT"
            else
              echo "Off-main manual run, cache miss; the VM will build LLVM."
              echo "hit=false" >> "$GITHUB_OUTPUT"
            fi
          else
            touch .libs-cache-miss
            echo "::notice::DragonFly libs cache miss (tag $LIBS_TAG) on a main run; skipping this tier-3 run. The warmer refills it on the next push to main."
          fi
      - name: Provision VM
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: bash .ci-scripts/bsd/dragonfly-provision.bash
      - name: Assert unsupported build options are rejected
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i vm_key -p 2222 root@localhost /bin/sh <<'EOF'
          set -e
          cd /build/ponyc
          sh .ci-scripts/dragonfly-reject-unsupported-builds.sh
          EOF
      - name: Restore libs
        if: ${{ hashFiles('.libs-cache-miss') == '' && steps.check.outputs.hit == 'true' }}
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          # Unquoted heredoc on purpose: ${LIBS_TAG} must expand on the runner
          # (it is not set inside the VM), so EOF must stay unquoted.
          # shellcheck disable=SC2087
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 root@localhost /bin/sh <<EOF
          set -e
          cd /build/ponyc
          export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' GITHUB_ACTOR='${{ github.actor }}' CC=/usr/local/bin/gcc13 CXX=/usr/local/bin/g++13 LD_LIBRARY_PATH=/usr/local/lib/gcc13 SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt
          python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit --branch-cache --platform dragonfly-6.4.2 --tag '${LIBS_TAG}'
          EOF
      - name: Build libs
        if: ${{ hashFiles('.libs-cache-miss') == '' && steps.check.outputs.hit == 'false' }}
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          # When off main and the libs aren't cached, build LLVM in the VM (hours)
          # and push it to the branch cache, so a re-dispatch reuses the build. rm
          # build/build_libs first to free the VM's /build disk before the test
          # build.
          # Unquoted heredoc on purpose: ${LIBS_TAG} must expand on the runner
          # (it is not set inside the VM), so EOF must stay unquoted.
          # shellcheck disable=SC2087
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 root@localhost /bin/sh <<EOF
          set -e
          cd /build/ponyc
          export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' GITHUB_REPOSITORY='${{ github.repository }}' GITHUB_ACTOR='${{ github.actor }}' CC=/usr/local/bin/gcc13 CXX=/usr/local/bin/g++13 LD_LIBRARY_PATH=/usr/local/lib/gcc13 SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt
          gmake libs llvm_tools=false build_flags=-j4
          rm -rf build/build_libs
          python3 .ci-scripts/libs-cache/branch_libs_cache.py push --platform dragonfly-6.4.2 --tag '${LIBS_TAG}' || echo '::warning::dragonfly branch libs cache push failed, will rebuild next run'
          EOF
      - name: Build and test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i vm_key -p 2222 root@localhost /bin/sh <<'EOF'
          set -e
          export CC=/usr/local/bin/gcc13
          export CXX=/usr/local/bin/g++13
          export LD_LIBRARY_PATH=/usr/local/lib/gcc13
          export SSL_CERT_FILE=/usr/local/share/certs/ca-root-nss.crt
          cd /build/ponyc
          gmake configure config=debug
          gmake build config=debug
          # Smoke-test the --static embedded-LLD link path; the test targets
          # below only exercise dynamic linking. Covers actor init plus
          # exception unwinding through DragonFly's static recipe (no
          # crtbeginT.o, pkg-gcc CRT directory resolution).
          mkdir -p /build/static-smoke
          printf 'actor Main\n  new create(env: Env) =>\n    try error else env.out.print("static ok") end\n' > /build/static-smoke/main.pony
          PONYPATH="$PWD/packages" ./build/debug/ponyc --static -o /build/static-smoke /build/static-smoke
          file /build/static-smoke/static-smoke | grep -q 'statically linked'
          /build/static-smoke/static-smoke
          gmake test-ci-core config=debug
          gmake test-pony-doc config=debug
          gmake test-pony-lint config=debug
          gmake test-pony-lsp config=debug
          gmake configure config=release
          gmake build config=release
          gmake test-ci-core config=release
          # gcc use=coverage smoke test — see the script for details. It does a
          # clean + reconfigure of the debug build with use=coverage, so it runs
          # last, after the release tests that depend on the prior builds.
          sh .ci-scripts/dragonfly-coverage-smoke.sh
          EOF
      - name: Shutdown VM
        if: ${{ always() && hashFiles('.libs-cache-miss') == '' }}
        run: |
          pkill -f qemu-system-x86 || true
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
