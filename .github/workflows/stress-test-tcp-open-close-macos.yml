name: "Stress Test: MacOS TCP Open/Close"

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: write

# Serialize the scheduled stress loop to one workflow at a time (groups are
# repo-wide, so the three tcp-open-close stress workflows share `stress-scheduled`;
# the generative workflows share their own `stress-scheduled-generative`). Manual
# runs get a unique group (github.run_id) so a branch check never queues behind
# the loop. Relies on these workflows having exactly two triggers (schedule +
# workflow_dispatch) -- see the per-event flag/alert conditions below.
concurrency:
  group: stress-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled' }}
  cancel-in-progress: false

jobs:
  x86_64-macos:
    runs-on: macos-15-intel

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: "x86-64 macOS [release]"
            target: test-stress-tcp-open-close-release
          - name: "x86-64 macOS [debug]"
            target: test-stress-tcp-open-close-debug
          - name: "x86-64 macOS [cd] [release]"
            target: test-stress-tcp-open-close-with-cd-release
          - name: "x86-64 macOS [cd] [debug]"
            target: test-stress-tcp-open-close-with-cd-debug

    name: ${{matrix.target}}:${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.sha != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.sha != 'main') && '-- make libs llvm_tools=false build_flags=-j4') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --platform x86-macos-15-intel --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure arch=x86-64 config=debug
          make build config=debug
      - name: Configure networking
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: bash .ci-scripts/macOS-configure-networking.bash
      - name: Run Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make ${{ matrix.target }} open_close_stress_connections=1000000 config=debug usedebugger=lldb
      # cancelled() too: failure() is false when a job hits timeout-minutes.
      - name: Send alert on failure or cancellation
        if: ${{ (failure() || cancelled()) && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  arm64-macos:
    runs-on: macos-26
    # Run after the x86 job so the whole workflow is never more than 2 cells at
    # once (max-parallel: 2 per matrix); !cancelled() keeps arm64 running even
    # when an x86 cell had a real failure.
    needs: x86_64-macos
    if: ${{ !cancelled() }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: "arm64 macOS [release]"
            target: test-stress-tcp-open-close-release
          - name: "arm64 macOS [debug]"
            target: test-stress-tcp-open-close-debug
          - name: "arm64 macOS [cd] [release]"
            target: test-stress-tcp-open-close-with-cd-release
          - name: "arm64 macOS [cd] [debug]"
            target: test-stress-tcp-open-close-with-cd-debug

    name: ${{matrix.target}}:${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.sha != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.sha != 'main') && '-- make libs llvm_tools=false build_flags=-j3') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --platform arm64-macos-26 --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=debug
          make build config=debug
      - name: Configure networking
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: bash .ci-scripts/macOS-configure-networking.bash
      - name: Run Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make ${{ matrix.target }} config=debug usedebugger=lldb
      # cancelled() too: failure() is false when a job hits timeout-minutes.
      - name: Send alert on failure or cancellation
        if: ${{ (failure() || cancelled()) && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
