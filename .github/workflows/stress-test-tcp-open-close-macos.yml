name: "Stress Test: MacOS TCP Open/Close"

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: read

# Serialize the scheduled stress loop to one workflow at a time (groups are
# repo-wide, so all six stress workflows share `stress-scheduled`). Manual runs
# get a unique group (github.run_id) so a branch check never queues behind the
# loop. Relies on these workflows having exactly two triggers (schedule +
# workflow_dispatch) -- see the per-event flag/alert conditions below.
concurrency:
  group: stress-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled' }}
  cancel-in-progress: false

jobs:
  x86_64-macos:
    runs-on: macos-15-intel

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: "x86-64 macOS [release]"
            target: test-stress-tcp-open-close-release
          - name: "x86-64 macOS [debug]"
            target: test-stress-tcp-open-close-debug
          - name: "x86-64 macOS [cd] [release]"
            target: test-stress-tcp-open-close-with-cd-release
          - name: "x86-64 macOS [cd] [debug]"
            target: test-stress-tcp-open-close-with-cd-debug

    name: ${{matrix.target}}:${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # schedule -> skip the run on a cache miss (the loop overlaps an empty/
          # refilling cache); manual dispatch -> also pull the branch cache so a
          # branch run finds the libs it already built, and fail loudly otherwise.
          LIBS_CACHE_FLAGS: ${{ github.event_name == 'schedule' && '--skip-on-miss' || '--branch-cache' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit $LIBS_CACHE_FLAGS --platform x86-macos-15-intel --tag "$LIBS_TAG"
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure arch=x86-64 config=debug
          make build config=debug
      - name: Configure networking
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: bash .ci-scripts/macOS-configure-networking.bash
      - name: Run Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make ${{ matrix.target }} open_close_stress_connections=1000000 config=debug usedebugger=lldb
      - name: Send alert on failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  arm64-macos:
    runs-on: macos-26
    # Run after the x86 job so the whole workflow is never more than 2 cells at
    # once (max-parallel: 2 per matrix); !cancelled() keeps arm64 running even
    # when an x86 cell had a real failure.
    needs: x86_64-macos
    if: ${{ !cancelled() }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: "arm64 macOS [release]"
            target: test-stress-tcp-open-close-release
          - name: "arm64 macOS [debug]"
            target: test-stress-tcp-open-close-debug
          - name: "arm64 macOS [cd] [release]"
            target: test-stress-tcp-open-close-with-cd-release
          - name: "arm64 macOS [cd] [debug]"
            target: test-stress-tcp-open-close-with-cd-debug

    name: ${{matrix.target}}:${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # schedule -> skip the run on a cache miss (the loop overlaps an empty/
          # refilling cache); manual dispatch -> also pull the branch cache so a
          # branch run finds the libs it already built, and fail loudly otherwise.
          LIBS_CACHE_FLAGS: ${{ github.event_name == 'schedule' && '--skip-on-miss' || '--branch-cache' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit $LIBS_CACHE_FLAGS --platform arm64-macos-26 --tag "$LIBS_TAG"
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=debug
          make build config=debug
      - name: Configure networking
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: bash .ci-scripts/macOS-configure-networking.bash
      - name: Run Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: make ${{ matrix.target }} config=debug usedebugger=lldb
      - name: Send alert on failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
