name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # The UNION of the three suites' path rules. It MUST trigger the workflow
    # for any file that triggers any suite in `.ci-scripts/pr_changed_suites.py`;
    # otherwise that PR never starts the workflow and the suite silently never
    # runs. `ponyc` is a subset of `tools`, so the union is `tools` plus
    # `pony_compiler` plus this workflow file. The re-includes below add back the
    # pony_compiler paths (which have no doc/yaml exclusion) and this file.
    paths:
      - '**'
      - '!**/*.md'
      - '!**/*.yml'
      - '!.dockerfiles/**'
      - '!.ci-dockerfiles/**'
      - '!.gitignore'
      - '!.markdownlintignore'
      # Test workloads these suites build nothing of: their Pony runs only in
      # scheduled workflows (stress-test-*, ponyc-weekly-checks). The stress
      # harness's Python is linted/tested by lint-python.yml; rt-systematic has
      # no Python. Excluded here AND in pr_changed_suites.py.
      - '!test/rt-stress/**'
      - '!test/rt-systematic/**'
      - 'src/libponyc/**'
      - 'tools/lib/ponylang/pony_compiler/**'
      - '.github/workflows/pr.yml'

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # write (not read) so non-fork PR runs can push to the branch libs cache. A
  # pull_request run from a fork gets a read-only GITHUB_TOKEN regardless, so this
  # grants effective write only to non-fork runs.
  packages: write
  contents: read       # checkout
  pull-requests: read  # gh api pulls/<n>/files in the `changes` job

jobs:
  # Home-grown paths-filter: classify the PR's changed files into the suites
  # that must run, so a PR touching only one suite does not queue all three.
  # Draft gating lives here only: when this job is skipped every downstream
  # output is empty, so the `== 'true'` checks all fail and every job skips.
  changes:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      ponyc: ${{ steps.classify.outputs.ponyc }}
      pony_compiler: ${{ steps.classify.outputs.pony_compiler }}
      tools: ${{ steps.classify.outputs.tools }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Classify changed files
        id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --jq '.[].filename' | python3 .ci-scripts/pr_changed_suites.py >> "$GITHUB_OUTPUT"

  # maybe-build jobs: build each shared LLVM platform AT MOST ONCE, then the
  # consumer jobs `needs:` it and pull. `--ensure` checks existence (no
  # download) and HARD-fails the branch push, so a registry write problem
  # surfaces here instead of leaving each consumer to cold-build. Non-fork only
  # (the push needs `packages: write`); forks skip and consumers pull-or-build.
  maybe-build-ubuntu:
    needs: changes
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.changes.outputs.ponyc == 'true' ||
       needs.changes.outputs.pony_compiler == 'true' ||
       needs.changes.outputs.tools == 'true')
    runs-on: ubuntu-latest
    name: maybe-build libs (x86-64 Linux glibc)
    container:
      image: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
      options: --user pony
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Ensure libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py --ensure --branch-cache --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- cmake -DJOBS=4 -P lib/build-libs.cmake

  maybe-build-macos:
    needs: changes
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.changes.outputs.ponyc == 'true' ||
       needs.changes.outputs.pony_compiler == 'true' ||
       needs.changes.outputs.tools == 'true')
    runs-on: macos-26
    name: maybe-build libs (arm64 macOS)
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Ensure libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py --ensure --branch-cache --platform arm64-macos-26 --tag "$LIBS_TAG" -- cmake -DJOBS=3 -P lib/build-libs.cmake

  maybe-build-windows:
    needs: changes
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.changes.outputs.ponyc == 'true' ||
       needs.changes.outputs.pony_compiler == 'true' ||
       needs.changes.outputs.tools == 'true')
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    name: maybe-build libs (x86-64 Windows)
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Ensure libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
        run: python .ci-scripts/libs-cache/pr_libs_cache.py --ensure --branch-cache --platform windows-2025-vs2026 --tag "$env:LIBS_TAG" '--' cmake -DPRESET=libs-windows-x86-64 -DJOBS=4 -P lib/build-libs.cmake

  # ----- ponyc suite -----

  ponyc-x86_64-linux-glibc:
    needs: [changes, maybe-build-ubuntu]
    if: >-
      !cancelled() &&
      needs.changes.outputs.ponyc == 'true' &&
      needs.maybe-build-ubuntu.result != 'failure'
    runs-on: ubuntu-latest
    name: 'ponyc: x86-64 Linux glibc'
    container:
      image: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py $LIBS_BRANCH_CACHE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- cmake -DJOBS=4 -P lib/build-libs.cmake
      - name: Build Debug Runtime
        run: |
          cmake --preset x86-64-debug
          cmake --build --preset x86-64-debug
      - name: Test with Debug Runtime
        run: |
          PONY_TEST_DEBUGGER="$(.ci-scripts/test-debugger.sh lldb)"
          export PONY_TEST_DEBUGGER
          ctest --preset x86-64-debug -L ci-core
      - name: Build Release Runtime
        run: |
          cmake --preset x86-64-release
          cmake --build --preset x86-64-release
      - name: Test with Release Runtime
        run: |
          PONY_TEST_DEBUGGER="$(.ci-scripts/test-debugger.sh lldb)"
          export PONY_TEST_DEBUGGER
          ctest --preset x86-64-release -L ci-core

  ponyc-arm64-macos:
    needs: [changes, maybe-build-macos]
    if: >-
      !cancelled() &&
      needs.changes.outputs.ponyc == 'true' &&
      needs.maybe-build-macos.result != 'failure'
    runs-on: macos-26
    name: 'ponyc: arm64 macOS'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py $LIBS_BRANCH_CACHE --platform arm64-macos-26 --tag "$LIBS_TAG" -- cmake -DJOBS=3 -P lib/build-libs.cmake
      - name: Build Debug Runtime
        run: |
          cmake --preset armv8-debug
          cmake --build --preset armv8-debug
      - name: Test with Debug Runtime
        run: ctest --preset armv8-debug -L ci-core
      - name: Build Release Runtime
        run: |
          cmake --preset armv8-release
          cmake --build --preset armv8-release
      - name: Test with Release Runtime
        run: ctest --preset armv8-release -L ci-core

  ponyc-x86_64-windows:
    needs: [changes, maybe-build-windows]
    if: >-
      !cancelled() &&
      needs.changes.outputs.ponyc == 'true' &&
      needs.maybe-build-windows.result != 'failure'
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    name: 'ponyc: x86-64 Windows MSVC'
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        run: .\.ci-scripts\windows-install-deps.ps1
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python .ci-scripts/libs-cache/pr_libs_cache.py $env:LIBS_BRANCH_CACHE --platform windows-2025-vs2026 --tag "$env:LIBS_TAG" '--' cmake -DPRESET=libs-windows-x86-64 -DJOBS=4 -P lib/build-libs.cmake
      - name: Configure
        run: cmake --preset windows-x86-64
      - name: Build Debug Runtime
        run: cmake --build --preset windows-x86-64-debug
      - name: Test with Debug Runtime
        run: |
          $env:PONY_TEST_DEBUGGER = & .ci-scripts/test-debugger.ps1 lldb
          ctest --preset windows-x86-64-debug -L ci-core
      - name: Build Release Runtime
        run: cmake --build --preset windows-x86-64-release
      - name: Test with Release Runtime
        run: |
          $env:PONY_TEST_DEBUGGER = & .ci-scripts/test-debugger.ps1 lldb
          ctest --preset windows-x86-64-release -L ci-core

  # ----- pony-compiler suite -----

  pony-compiler-linux:
    needs: [changes, maybe-build-ubuntu]
    if: >-
      !cancelled() &&
      needs.changes.outputs.pony_compiler == 'true' &&
      needs.maybe-build-ubuntu.result != 'failure'
    runs-on: ubuntu-latest
    name: 'pony-compiler: Linux'
    container:
      image: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
      options: --user pony
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py $LIBS_BRANCH_CACHE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- cmake -DJOBS=4 -P lib/build-libs.cmake
      - name: Build
        run: |
          cmake --preset debug
          cmake --build --preset debug
          cmake --build --preset debug --target pony-compiler-tests
      - name: Test pony-compiler
        run: ctest --preset debug -R pony-compiler-tests

  pony-compiler-macos:
    needs: [changes, maybe-build-macos]
    if: >-
      !cancelled() &&
      needs.changes.outputs.pony_compiler == 'true' &&
      needs.maybe-build-macos.result != 'failure'
    runs-on: macos-26
    name: 'pony-compiler: macOS'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py $LIBS_BRANCH_CACHE --platform arm64-macos-26 --tag "$LIBS_TAG" -- cmake -DJOBS=3 -P lib/build-libs.cmake
      - name: Build
        run: |
          cmake --preset armv8-debug
          cmake --build --preset armv8-debug
          cmake --build --preset armv8-debug --target pony-compiler-tests
      - name: Test pony-compiler
        run: ctest --preset armv8-debug -R pony-compiler-tests

  pony-compiler-windows:
    needs: [changes, maybe-build-windows]
    if: >-
      !cancelled() &&
      needs.changes.outputs.pony_compiler == 'true' &&
      needs.maybe-build-windows.result != 'failure'
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    name: 'pony-compiler: Windows'
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python .ci-scripts/libs-cache/pr_libs_cache.py $env:LIBS_BRANCH_CACHE --platform windows-2025-vs2026 --tag "$env:LIBS_TAG" '--' cmake -DPRESET=libs-windows-x86-64 -DJOBS=4 -P lib/build-libs.cmake
      - name: Build
        run: |
          cmake --preset windows-x86-64
          cmake --build --preset windows-x86-64-debug
          cmake --build --preset windows-x86-64-debug --target pony-compiler-tests
      - name: Test pony-compiler
        run: ctest --preset windows-x86-64-debug -R pony-compiler-tests

  # ----- tools suite -----

  tools-linux:
    needs: [changes, maybe-build-ubuntu]
    if: >-
      !cancelled() &&
      needs.changes.outputs.tools == 'true' &&
      needs.maybe-build-ubuntu.result != 'failure'
    runs-on: ubuntu-latest
    name: 'Tools: Linux'
    container:
      image: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
      options: --user pony
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py $LIBS_BRANCH_CACHE --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- cmake -DJOBS=4 -P lib/build-libs.cmake
      - name: Build
        run: |
          cmake --preset debug
          cmake --build --preset debug
          cmake --build --preset debug --target pony-doc-tests pony-lint-tests pony-lsp-tests
      - name: Test pony-doc
        run: ctest --preset debug -R pony-doc-tests
      - name: Test pony-lint
        run: ctest --preset debug -R pony-lint-tests
      - name: Test pony-lsp
        run: ctest --preset debug -R pony-lsp-tests
      - name: Lint pony-lint
        run: cd build/debug && PONYPATH=../../tools/lib/ponylang/pony_compiler ./pony-lint ../../tools/pony-lint/
      - name: Lint pony-doc
        run: cd build/debug && PONYPATH=../../tools/lib/ponylang/pony_compiler ./pony-lint ../../tools/pony-doc/
      - name: Lint pony-lsp
        run: cd build/debug && PONYPATH=../../tools/lib/ponylang/pony_compiler ./pony-lint ../../tools/pony-lsp/

  tools-macos:
    needs: [changes, maybe-build-macos]
    if: >-
      !cancelled() &&
      needs.changes.outputs.tools == 'true' &&
      needs.maybe-build-macos.result != 'failure'
    runs-on: macos-26
    name: 'Tools: macOS'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python3 .ci-scripts/libs-cache/pr_libs_cache.py $LIBS_BRANCH_CACHE --platform arm64-macos-26 --tag "$LIBS_TAG" -- cmake -DJOBS=3 -P lib/build-libs.cmake
      - name: Build
        run: |
          cmake --preset armv8-debug
          cmake --build --preset armv8-debug
          cmake --build --preset armv8-debug --target pony-doc-tests pony-lint-tests pony-lsp-tests
      - name: Test pony-doc
        run: ctest --preset armv8-debug -R pony-doc-tests
      - name: Test pony-lint
        run: ctest --preset armv8-debug -R pony-lint-tests
      - name: Test pony-lsp
        run: ctest --preset armv8-debug -R pony-lsp-tests

  tools-windows:
    needs: [changes, maybe-build-windows]
    if: >-
      !cancelled() &&
      needs.changes.outputs.tools == 'true' &&
      needs.maybe-build-windows.result != 'failure'
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    name: 'Tools: Windows'
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Referenced UNQUOTED below so an empty value (fork) vanishes instead of
          # passing as an empty arg; see the branch-cache coupling in .known-couplings/branch-libs-cache.md.
          LIBS_BRANCH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && '--branch-cache' || '' }}
        run: python .ci-scripts/libs-cache/pr_libs_cache.py $env:LIBS_BRANCH_CACHE --platform windows-2025-vs2026 --tag "$env:LIBS_TAG" '--' cmake -DPRESET=libs-windows-x86-64 -DJOBS=4 -P lib/build-libs.cmake
      - name: Build
        run: |
          cmake --preset windows-x86-64
          cmake --build --preset windows-x86-64-debug
          cmake --build --preset windows-x86-64-debug --target pony-doc-tests pony-lint-tests pony-lsp-tests
      - name: Test pony-doc
        run: ctest --preset windows-x86-64-debug -R pony-doc-tests
      - name: Test pony-lint
        run: ctest --preset windows-x86-64-debug -R pony-lint-tests
      - name: Test pony-lsp
        run: ctest --preset windows-x86-64-debug -R pony-lsp-tests
