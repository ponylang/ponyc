name: "Stress Test: Windows Generative (Systematic)"

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: write

concurrency:
  group: stress-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled-generative' }}
  cancel-in-progress: false

jobs:
  x86_64-windows:
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    # A bounded soak; the orchestrator also caps each seed with a per-run
    # watchdog. The 240m job cap stays under twice the tightest gap between
    # generative cron slots (3h), so a job running to its cap is cancelled before
    # it can span two firings. Spanning two would make the shared concurrency
    # group drop a pending run; as it is, the next run is only delayed.
    timeout-minutes: 240

    name: x86-64 Windows generative systematic [debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Install Dependencies
        # lldb, so this lane runs the engine under it and captures a backtrace on
        # a crash and, on a watchdog timeout, on a hang. A systematic crash
        # reproduces from its seed, but an intermittent hang need not, so the
        # in-the-moment stack is the only artifact for it. The pinned package set
        # lives in the script.
        run: .\.ci-scripts\windows-install-deps.ps1
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          # PowerShell does not word-split a variable's value, so the two modes are
          # spelled out with literal tokens.
          LIBS_OFF_MAIN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sha != 'main' }}
        run: |
          if ($env:LIBS_OFF_MAIN -eq 'true') {
            python .ci-scripts/libs-cache/resolve_libs_cache.py --branch-cache --platform windows-2025-vs2026 --tag $env:LIBS_TAG '--' cmake -DPRESET=libs-windows-x86-64 -DJOBS=4 -P lib/build-libs.cmake
          } else {
            python .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit --skip-on-miss --platform windows-2025-vs2026 --tag $env:LIBS_TAG
          }
      - name: Configure
        # Systematic testing is enabled on its own. The output dir is
        # build\debug-systematic_testing.
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: cmake --preset windows-x86-64 -DPONY_USES=systematic_testing
      - name: Build Debug Systematic Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: cmake --build --preset windows-x86-64-debug
      - name: Run Generative Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        # Under lldb, as every other generative lane: a crash or a watchdog
        # timeout then carries an all-thread backtrace into the failure bundle.
        # lldb does not change the systematic interleaving -- across 10 seeds the
        # same seed produced the identical ORDER_SIG direct and under lldb -- so
        # the determinism oracle holds. lldb startup costs ~1.4s per run over
        # direct (measured on a local Windows box, debug engine), so the 250-seed
        # double-run soak stays far inside the 240-minute job cap.
        run: |
          python test/rt-stress/generative/orchestrate_systematic.py `
            --ponyc build/debug-systematic_testing/ponyc.exe `
            --lldb 'C:\msys64\mingw64\bin\lldb.exe' `
            --use-flags systematic_testing `
            --start ${{ github.run_id }} --count 250 `
            --out rt-stress-out
      # cancelled() too: keep bundles from seeds that ran before a cancel.
      - name: Upload failure bundles
        if: ${{ (failure() || cancelled()) && hashFiles('.libs-cache-miss') == '' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: generative-systematic-bundles-windows
          path: rt-stress-out/*.json
          if-no-files-found: ignore
      # cancelled() too: failure() is false when a job hits timeout-minutes.
      - name: Send alert on failure or cancellation
        if: ${{ (failure() || cancelled()) && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
