name: "Stress Test: macOS Generative (Systematic)"

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: write

concurrency:
  group: stress-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled-generative' }}
  cancel-in-progress: false

jobs:
  arm64-macos:
    runs-on: macos-26
    # A bounded soak; the orchestrator also caps each seed with a per-run
    # watchdog (--timeout, set below). This runner's speed varies wildly day to
    # day: the soak step measures 3-6 min on a typical scheduled run, but one
    # observed day (2026-07-01) ran ~60x slow across the board and took 3.5h.
    # The fewer seeds (200 vs the other lanes' 250) and the longer per-run
    # watchdog (180s vs 120s) are headroom for that tail. The watchdog is still
    # the only hang detector here (see
    # .known-couplings/systematic-testing-park-sites.md) -- a real hang surfaces
    # as a timeout, and the failure bundle now carries an all-thread backtrace
    # of the hung engine, captured via lldb before the kill. The 240m job cap
    # below is the shared generative ceiling (see stress-test-concurrency.md).
    timeout-minutes: 240

    name: arm64 macOS generative systematic [debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('lib/CMakePresets.json', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/build-libs.cmake', 'lib/llvm/patches/*') }}
          # Off main (a manual dispatch of a branch): build LLVM if it isn't cached,
          # and push what we build. On main (a scheduled run, or a dispatch left on
          # main): if it isn't cached, skip -- we don't build LLVM on main.
          LIBS_MODE: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.sha != 'main') && '--branch-cache') || '--require-cache-hit --skip-on-miss' }}
          LIBS_BUILD: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.sha != 'main') && '-- cmake -DJOBS=3 -P lib/build-libs.cmake') || '' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py $LIBS_MODE --platform arm64-macos-26 --tag "$LIBS_TAG" $LIBS_BUILD
      - name: Build Debug Systematic Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          cmake --preset debug -DPONY_USES=scheduler_scaling_pthreads,systematic_testing
          cmake --build --preset debug
      - name: Run Generative Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          python3 test/rt-stress/generative/orchestrate_systematic.py \
            --ponyc build/debug-scheduler_scaling_pthreads-systematic_testing/ponyc \
            --use-flags scheduler_scaling_pthreads,systematic_testing \
            --start ${{ github.run_id }} --count 200 \
            --timeout 180 \
            --out rt-stress-out
      # cancelled() too: keep bundles from seeds that ran before a cancel.
      - name: Upload failure bundles
        if: ${{ (failure() || cancelled()) && hashFiles('.libs-cache-miss') == '' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: generative-systematic-bundles-macos-arm
          path: rt-stress-out/*.json
          if-no-files-found: ignore
      # cancelled() too: failure() is false when a job hits timeout-minutes.
      - name: Send alert on failure or cancellation
        if: ${{ (failure() || cancelled()) && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
