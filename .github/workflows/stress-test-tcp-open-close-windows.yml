name: "Stress Test: Windows TCP Open/Close"

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: read

# Serialize the scheduled stress loop to one workflow at a time (groups are
# repo-wide, so the three tcp-open-close stress workflows share `stress-scheduled`;
# the generative workflows share their own `stress-scheduled-generative`). Manual
# runs get a unique group (github.run_id) so a branch check never queues behind
# the loop. Relies on these workflows having exactly two triggers (schedule +
# workflow_dispatch) -- see the per-event flag/alert conditions below.
concurrency:
  group: stress-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled' }}
  cancel-in-progress: false

jobs:
  x86_64-windows:
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: "x86-64 Windows [release]"
            target: stress-test-tcp-open-close-release
          - name: "x86-64 Windows [debug]"
            target: stress-test-tcp-open-close-debug
          - name: "x86-64 Windows [cd] [release]"
            target: stress-test-tcp-open-close-with-cd-release
          - name: "x86-64 Windows [cd] [debug]"
            target: stress-test-tcp-open-close-with-cd-debug

    name: ${{matrix.target}}:${{ matrix.name }}
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Install Dependencies
        # Pin mingw-w64 LLVM family and the runtime dependencies lldb
        # imports against.
        #
        # History:
        # (1) 2026-05-03: lldb-22.1.4-2 ("llvm: emutls rebuild") crashed
        #     in liblldb.dll with 0xC0000005. Pinned llvm-libs,
        #     clang-libs, lldb to 22.1.4-1.
        # (2) 2026-05-11: msys2 bumped unpinned dependencies (gcc-libs
        #     16.1.0-2 -> -3, plus expat/mpdecimal/python pkgrel bumps).
        #     The pinned lldb 22.1.4-1 then failed to load with
        #     0xC0000139 STATUS_ENTRYPOINT_NOT_FOUND — the rebuilt deps
        #     had shifted symbols out from under lldb. Extended the pin
        #     to those deps.
        #
        # See Discussion #5007. Installed via `pacman -U` from explicit
        # URLs so the initial `-Syuu` can't re-introduce a broken
        # combination.
        run: |
          function msys() { C:\msys64\usr\bin\bash.exe @('-lc') + @Args }
          msys ' '
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -S --needed base-devel'
          msys 'pacman --noconfirm -U https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-llvm-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-clang-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-lldb-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-gcc-libs-16.1.0-2-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-expat-2.8.0-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-mpdecimal-4.0.1-2-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-python-3.14.4-2-any.pkg.tar.zst'
          msys 'pacman --noconfirm -Scc'
          python.exe -m pip install --upgrade cloudsmith-cli
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # schedule -> skip the run on a cache miss (the loop overlaps an empty/
          # refilling cache); manual dispatch -> also pull the branch cache so a
          # branch run finds the libs it already built, and fail loudly otherwise.
          LIBS_CACHE_FLAGS: ${{ github.event_name == 'schedule' && '--skip-on-miss' || '--branch-cache' }}
        run: python .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit $env:LIBS_CACHE_FLAGS --platform windows-2025-vs2026 --tag $env:LIBS_TAG
      - name: Configure
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: .\make.ps1 -Command configure -Config Debug
      - name: Build Debug Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: .\make.ps1 -Command build -Config Debug
      - name: Run Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: .\make.ps1 -Command ${{ matrix.target }} -Config Debug
      - name: Send alert on failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
