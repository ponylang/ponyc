name: ponyc

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '!tools/**'
      - '!**/*.md'
      - '!**/*.yml'
      - '!.dockerfiles/**'
      - '!.ci-dockerfiles/**'
      - '!.gitignore'
      - '!.markdownlintignore'
      - '.github/workflows/pr-ponyc.yml'

concurrency:
  group: pr-ponyc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # write (not read) so non-fork PR runs can push to the per-PR branch libs
  # cache. A pull_request run from a fork gets a read-only GITHUB_TOKEN
  # regardless, so this grants effective write only to non-fork runs.
  packages: write

jobs:
  x86_64-linux:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-ubuntu24.04-builder:20250115
            name: x86-64 Linux glibc
            debugger: lldb
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: x86-64 Linux musl
            debugger: lldb

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          LIBS_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.number || '' }}
        run: python3 .ci-scripts/pr_libs_cache.py --image "$LIBS_IMAGE" --tag "$LIBS_TAG" --pr "$LIBS_PR" -- make libs llvm_tools=false build_flags=-j4
      - name: Build Debug Runtime
        run: |
          make configure arch=x86-64 config=debug
          make build config=debug
      - name: Test with Debug Runtime
        run: make test-ci-core config=debug usedebugger='${{ matrix.debugger }}'
      - name: Build Release Runtime
        run: |
          make configure arch=x86-64 config=release
          make build config=release
      - name: Test with Release Runtime
        run: make test-ci-core config=release usedebugger='${{ matrix.debugger }}'

  arm64-macos:
    if: github.event.pull_request.draft == false
    runs-on: macos-26

    name: arm64 Apple Darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          LIBS_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.number || '' }}
        run: python3 .ci-scripts/pr_libs_cache.py --platform arm64-macos-26 --tag "$LIBS_TAG" --pr "$LIBS_PR" -- make libs llvm_tools=false build_flags=-j3
      - name: Build Debug Runtime
        run: |
          make configure arch=armv8 config=debug
          make build config=debug
      - name: Test with Debug Runtime
        run: make test-ci-core config=debug
      - name: Build Release Runtime
        run: |
          make configure arch=armv8 config=release
          make build config=release
      - name: Test with Release Runtime
        run: make test-ci-core config=release

  x86_64-windows:
    if: github.event.pull_request.draft == false
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh

    name: x86-64 Windows MSVC
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        # Pin mingw-w64 LLVM family and the runtime dependencies lldb
        # imports against.
        #
        # History:
        # (1) 2026-05-03: lldb-22.1.4-2 ("llvm: emutls rebuild") crashed
        #     in liblldb.dll with 0xC0000005. Pinned llvm-libs,
        #     clang-libs, lldb to 22.1.4-1.
        # (2) 2026-05-11: msys2 bumped unpinned dependencies (gcc-libs
        #     16.1.0-2 -> -3, plus expat/mpdecimal/python pkgrel bumps).
        #     The pinned lldb 22.1.4-1 then failed to load with
        #     0xC0000139 STATUS_ENTRYPOINT_NOT_FOUND — the rebuilt deps
        #     had shifted symbols out from under lldb. Extended the pin
        #     to those deps.
        #
        # See Discussion #5007. Installed via `pacman -U` from explicit
        # URLs so the initial `-Syuu` can't re-introduce a broken
        # combination.
        run: |
          function msys() { C:\msys64\usr\bin\bash.exe @('-lc') + @Args }
          msys ' '
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -S --needed base-devel'
          msys 'pacman --noconfirm -U https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-llvm-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-clang-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-lldb-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-gcc-libs-16.1.0-2-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-expat-2.8.0-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-mpdecimal-4.0.1-2-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-python-3.14.4-2-any.pkg.tar.zst'
          msys 'pacman --noconfirm -Scc'
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          LIBS_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.number || '' }}
        run: python .ci-scripts/pr_libs_cache.py --platform windows-2025-vs2026 --tag "$env:LIBS_TAG" --pr "$env:LIBS_PR" '--' pwsh -File make.ps1 -Command libs -LlvmTools false
      - name: Build Debug Runtime
        run: |
          .\make.ps1 -Command configure -Config Debug
          .\make.ps1 -Command build -Config Debug
      - name: Test with Debug Runtime
        run: .\make.ps1 -Command test -Config Debug -Uselldb yes
      - name: Build Release Runtime
        run: |
          .\make.ps1 -Command configure -Config Release
          .\make.ps1 -Command build -Config Release
      - name: Test with Release Runtime
        run: .\make.ps1 -Command test -Config Release -Uselldb yes
      - name: Build examples
        run: .\make.ps1 -Command build-examples

