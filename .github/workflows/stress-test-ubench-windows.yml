name: "Stress Test: Windows UBench"

on:
  schedule:
    - cron: "45 5 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: read

jobs:
  x86_64-windows:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "x86-64 Windows [release]"
            target: stress-test-ubench-release
          - name: "x86-64 Windows [debug]"
            target: stress-test-ubench-debug
          - name: "x86-64 Windows [cd] [release]"
            target: stress-test-ubench-with-cd-release
          - name: "x86-64 Windows [cd] [debug]"
            target: stress-test-ubench-with-cd-debug

    name: ${{matrix.target}}:${{ matrix.name }}
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Install Dependencies
        # Pin mingw-w64 LLVM family to 22.1.4-1.
        #
        # mingw-w64-x86_64-lldb-22.1.4-2 (msys2 PKGBUILD pkgrel bump on
        # 2026-05-03, "llvm: emutls rebuild") crashes in liblldb.dll with
        # 0xC0000005 when wrapping Pony test executables on windows-2025.
        # The crash reproduces across multiple unrelated branches; see
        # ponylang/ponyc Discussion #5007.
        #
        # lldb, clang-libs, and llvm-libs share one PKGBUILD and must
        # version-match. Installed via `pacman -U` from explicit URLs so
        # subsequent mirror upgrades cannot re-introduce 22.1.4-2.
        run: |
          function msys() { C:\msys64\usr\bin\bash.exe @('-lc') + @Args }
          msys ' '
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -S --needed base-devel'
          msys 'pacman --noconfirm -U https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-llvm-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-clang-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-lldb-22.1.4-1-any.pkg.tar.zst'
          msys 'pacman --noconfirm -Scc'
          python.exe -m pip install --upgrade cloudsmith-cli
      - name: Restore Libs Cache
        id: restore-libs
        uses: actions/cache/restore@v5.0.3
        with:
          path: |
            build/libs
            lib/llvm/src/compiler-rt/lib/builtins
          key: libs-windows-2025-${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
      - name: Build Libs
        if: steps.restore-libs.outputs.cache-hit != 'true'
        run: .\make.ps1 -Command libs
      - name: Save Libs Cache
        if: steps.restore-libs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5.0.3
        with:
          path: |
            build/libs
            lib/llvm/src/compiler-rt/lib/builtins
          key: libs-windows-2025-${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
      - name: Configure
        run: .\make.ps1 -Command configure -Config Debug
      - name: Build Debug Runtime
        run: .\make.ps1 -Command build -Config Debug
      - name: Run Stress Test
        run: .\make.ps1 -Command ${{ matrix.target }} -Config Debug
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@e4c8f27c732ba9bd98ac6be0583096dea82feea5
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
