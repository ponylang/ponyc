name: pony-compiler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/libponyc/**'
      - 'tools/lib/ponylang/pony_compiler/**'
      - '.github/workflows/pr-pony-compiler.yml'

concurrency:
  group: pr-pony-compiler-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # write (not read) so non-fork PR runs can push to the per-PR branch libs
  # cache. A pull_request run from a fork gets a read-only GITHUB_TOKEN
  # regardless, so this grants effective write only to non-fork runs.
  packages: write

jobs:
  linux:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: Linux
    container:
      image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
      options: --user pony
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          LIBS_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.number || '' }}
        run: python3 .ci-scripts/pr_libs_cache.py --image "$LIBS_IMAGE" --tag "$LIBS_TAG" --pr "$LIBS_PR" -- make libs llvm_tools=false build_flags=-j4
      - name: Build
        run: |
          make configure config=debug
          make build config=debug
      - name: Test pony-compiler
        run: make test-pony-compiler config=debug

  macos:
    if: github.event.pull_request.draft == false
    runs-on: macos-26

    name: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          LIBS_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.number || '' }}
        run: python3 .ci-scripts/pr_libs_cache.py --platform arm64-macos-26 --tag "$LIBS_TAG" --pr "$LIBS_PR" -- make libs llvm_tools=false build_flags=-j3
      - name: Build
        run: |
          make configure arch=armv8 config=debug
          make build config=debug
      - name: Test pony-compiler
        run: make test-pony-compiler config=debug

  windows:
    if: github.event.pull_request.draft == false
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh

    name: Windows
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          LIBS_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.number || '' }}
        run: python .ci-scripts/pr_libs_cache.py --platform windows-2025-vs2026 --tag "$env:LIBS_TAG" --pr "$env:LIBS_PR" '--' pwsh -File make.ps1 -Command libs -LlvmTools false
      - name: Build
        run: |
          .\make.ps1 -Command configure -Config Debug
          .\make.ps1 -Command build -Config Debug
      - name: Test pony-compiler
        run: .\make.ps1 -Command test -Config Debug -TestsToRun pony-compiler-tests
