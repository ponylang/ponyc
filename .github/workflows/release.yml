name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

concurrency: release

permissions:
  packages: read
  contents: write

jobs:
  # validation to assure that we should in fact continue with the release should
  # be done here. the primary reason for this step is to verify that the release
  # was started correctly by pushing a `release-X.Y.Z` tag rather than `X.Y.Z`.
  pre-artefact-creation:
    name: Tasks to run before artefact creation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: "main"
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: Validate CHANGELOG
        uses: docker://ghcr.io/ponylang/release-bot-action:0.6.6
        with:
          entrypoint: pre-artefact-changelog-check
      # Create the GitHub Release now with an empty body so each platform job
      # can attach its archive as an asset. announce-a-release.yml later
      # populates the body via publish-release-notes-to-github, which updates
      # rather than replaces the release and therefore leaves the assets
      # intact.
      - name: Create GitHub release (empty body; announce fills it)
        uses: docker://ghcr.io/ponylang/release-bot-action:0.6.6
        with:
          entrypoint: create-empty-github-release
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  x86_64-linux:
    needs:
      - pre-artefact-creation

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-ubuntu24.04-builder:20250115
            name: x86-64-unknown-linux-ubuntu24.04
            triple-os: linux-ubuntu24.04
            triple-vendor: unknown
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: x86-64-unknown-linux-alpine3.23
            triple-os: linux-alpine3.23
            triple-vendor: unknown
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.24-builder:20260611
            name: x86-64-unknown-linux-alpine3.24
            triple-os: linux-alpine3.24
            triple-vendor: unknown
          - image: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
            name: x86-64-unknown-linux-ubuntu26.04
            triple-os: linux-ubuntu26.04
            triple-vendor: unknown

    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user pony

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ${{ matrix.image }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- make libs llvm_tools=false build_flags=-j4
      - name: Release
        run: bash .ci-scripts/x86-64-release.bash
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          TRIPLE_VENDOR: ${{ matrix.triple-vendor }}
          TRIPLE_OS: ${{ matrix.triple-os }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  # Currently, Github actions supplied by GH like checkout and cache do not work
  # in musl libc environments on arm64. We can work around this by running
  # those actions on the host and then "manually" doing our work that would
  # normally be done "in the musl container" by starting the container ourselves
  # for various steps by invoking docker directly.
  #
  # This is not in line with our standard pattern of "just do it all in the
  # container" but is required to work around the GitHub actions limitation
  # documented above.
  arm64-linux:
    needs:
      - pre-artefact-creation

    runs-on: ubuntu-24.04-arm

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
            name: arm64-unknown-linux-alpine3.23
            triple-os: linux-alpine3.23
          - image: ghcr.io/ponylang/ponyc-ci-alpine3.24-builder:20260611
            name: arm64-unknown-linux-alpine3.24
            triple-os: linux-alpine3.24
          - image: ghcr.io/ponylang/ponyc-ci-arm64-unknown-linux-ubuntu24.04-builder:20250510
            name: arm64-unknown-linux-ubuntu24.04
            triple-os: linux-ubuntu24.04
            triple-vendor: unknown
          - image: ghcr.io/ponylang/ponyc-ci-ubuntu26.04-builder:20260425
            name: arm64-unknown-linux-ubuntu26.04
            triple-os: linux-ubuntu26.04

    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull Docker image
        run: docker pull ${{ matrix.image }}
      - name: Build libs
        env:
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: |
          docker run --rm \
            --user pony \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e GITHUB_REPOSITORY \
            -e GITHUB_ACTOR \
            -e LIBS_IMAGE="${{ matrix.image }}" \
            -e LIBS_TAG="$LIBS_TAG" \
            -v ${{ github.workspace }}:/home/pony/project \
            -w /home/pony/project \
            ${{ matrix.image }} \
            sh -c 'python3 .ci-scripts/libs-cache/resolve_libs_cache.py --image "$LIBS_IMAGE" --tag "$LIBS_TAG" -- make libs llvm_tools=false build_flags=-j4'
      - name: Release
        run: |
          docker run --rm \
          --user pony \
          -v ${{ github.workspace }}:/home/pony/project \
          -w /home/pony/project \
          -e CLOUDSMITH_API_KEY=${{ secrets.CLOUDSMITH_API_KEY }} \
          -e TRIPLE_OS=${{ matrix.triple-os }} \
          -e RELEASE_TOKEN=${{ secrets.RELEASE_TOKEN }} \
          -e GITHUB_REPOSITORY=${{ github.repository }} \
          ${{ matrix.image }} \
          bash .ci-scripts/arm64-unknown-linux-release.bash

  x86_macos:
    needs:
      - pre-artefact-creation

    runs-on: macos-15-intel

    name: x86-64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --platform x86-macos-15-intel --tag "$LIBS_TAG" -- make libs llvm_tools=false build_flags=-j4
      - name: Install Cloudsmith
        run: pip3 install --break-system-packages --upgrade cloudsmith-cli
      - name: Release
        run: bash .ci-scripts/x86-64-release.bash
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          TRIPLE_VENDOR: apple
          TRIPLE_OS: darwin
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  arm64_macos:
    needs:
      - pre-artefact-creation

    runs-on: macos-26

    name: arm64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --platform arm64-macos-26 --tag "$LIBS_TAG" -- make libs llvm_tools=false build_flags=-j3
      - name: Install Cloudsmith
        run: pip3 install --upgrade --break-system-packages cloudsmith-cli
      - name: Release
        run: bash .ci-scripts/arm64-apple-darwin-release.bash
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  x86_64-windows:
    needs:
      - pre-artefact-creation

    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh

    name: x86-64-pc-windows-msvc
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        # Pin mingw-w64 LLVM family and the runtime dependencies lldb
        # imports against.
        #
        # History:
        # (1) 2026-05-03: lldb-22.1.4-2 ("llvm: emutls rebuild") crashed
        #     in liblldb.dll with 0xC0000005. Pinned llvm-libs,
        #     clang-libs, lldb to 22.1.4-1.
        # (2) 2026-05-11: msys2 bumped unpinned dependencies (gcc-libs
        #     16.1.0-2 -> -3, plus expat/mpdecimal/python pkgrel bumps).
        #     The pinned lldb 22.1.4-1 then failed to load with
        #     0xC0000139 STATUS_ENTRYPOINT_NOT_FOUND — the rebuilt deps
        #     had shifted symbols out from under lldb. Extended the pin
        #     to those deps.
        #
        # See Discussion #5007. Installed via `pacman -U` from explicit
        # URLs so the initial `-Syuu` can't re-introduce a broken
        # combination.
        run: |
          function msys() { C:\msys64\usr\bin\bash.exe @('-lc') + @Args }
          msys ' '
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -Syuu'
          msys 'pacman --noconfirm -S --needed base-devel'
          msys 'pacman --noconfirm -U https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-llvm-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-clang-libs-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-lldb-22.1.4-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-gcc-libs-16.1.0-2-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-expat-2.8.0-1-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-mpdecimal-4.0.1-2-any.pkg.tar.zst https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-python-3.14.4-2-any.pkg.tar.zst'
          msys 'pacman --noconfirm -Scc'
          python.exe -m pip install --upgrade cloudsmith-cli
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python .ci-scripts/libs-cache/resolve_libs_cache.py --platform windows-2025-vs2026 --tag $env:LIBS_TAG '--' pwsh -File make.ps1 -Command libs -LlvmTools false
      - name: Configure
        run: .\make.ps1 -Command configure -Config Release -Prefix "build\install\release" -Version (Get-Content .\VERSION)
      - name: Build
        run: .\make.ps1 -Command build -Config Release -Prefix "build\install\release" -Version (Get-Content .\VERSION)
      - name: Install
        run: .\make.ps1 -Command install -Config Release -Prefix "build\install\release"
      - name: Package
        run: .\make.ps1 -Command package-x86-64 -Config Release -Prefix "build\install\release" -Version (Get-Content .\VERSION)
      - name: Upload
        run: |
          $version = (Get-Content .\VERSION)
          cloudsmith push raw --version $version --api-key $env:CLOUDSMITH_API_KEY --summary "Pony compiler" --description "https://github.com/ponylang/ponyc" ponylang/releases build\ponyc-x86-64-pc-windows-msvc.zip
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .ci-scripts\release\github_release.py upload $version build\ponyc-x86-64-pc-windows-msvc.zip
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  arm64-windows:
    needs:
      - pre-artefact-creation

    runs-on: windows-11-arm
    defaults:
      run:
        shell: pwsh

    name: arm64-pc-windows-msvc
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install Dependencies
        run: |
          # Pin cloudsmith-cli below 1.19.0: 1.19.0 added a PyJWT[crypto]
          # dependency that pulls in cryptography, which has no prebuilt
          # win_arm64 wheel and fails to build from source on this runner.
          # Remove once arm64 Windows can install the latest cloudsmith-cli
          # again.
          python.exe -m pip install --upgrade "cloudsmith-cli<1.19.0"
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: python .ci-scripts/libs-cache/resolve_libs_cache.py --platform windows-11-arm --tag $env:LIBS_TAG '--' pwsh -File make.ps1 -Command libs -LlvmTools false -Arch ARM64
      - name: Configure
        run: .\make.ps1 -Command configure -Config Release -Prefix "build\install\release" -Version (Get-Content .\VERSION) -Arch ARM64
      - name: Build
        run: .\make.ps1 -Command build -Config Release -Prefix "build\install\release" -Version (Get-Content .\VERSION)
      - name: Install
        run: .\make.ps1 -Command install -Config Release -Prefix "build\install\release"
      - name: Package
        run: .\make.ps1 -Command package-arm64 -Config Release -Prefix "build\install\release" -Version (Get-Content .\VERSION)
      - name: Upload
        run: |
          $version = (Get-Content .\VERSION)
          cloudsmith push raw --version $version --api-key $env:CLOUDSMITH_API_KEY --summary "Pony compiler" --description "https://github.com/ponylang/ponyc" ponylang/releases build\ponyc-arm64-pc-windows-msvc.zip
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .ci-scripts\release\github_release.py upload $version build\ponyc-arm64-pc-windows-msvc.zip
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
