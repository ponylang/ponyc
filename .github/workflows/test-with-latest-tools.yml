name: Test With Latest Tools

on:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: "test-with-latest-tools"

permissions:
  packages: write

jobs:
  rebuild-test-environment:
    name: Update arch builder
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        # v2.2.0
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build and Push
        run: bash .ci-dockerfiles/x86-64-unknown-linux-arch-builder/build-and-push.bash
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.

  build-and-test-ponyc:
    needs: rebuild-test-environment

    name: Build and Test ponyc
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ponylang/ponyc-ci-x86-64-unknown-linux-arch-builder:latest
      options: --user pony --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build Libs
        run: cmake -DJOBS=4 -P lib/build-libs.cmake
      - name: Build Debug Runtime
        run: |
          cmake --preset debug
          cmake --build --preset debug
      - name: Test with Debug Runtime
        run: |
          PONY_TEST_DEBUGGER="$(.ci-scripts/test-debugger.sh lldb)"
          export PONY_TEST_DEBUGGER
          ctest --preset debug -L ci-core
      - name: Build Release Runtime
        run: |
          cmake --preset release
          cmake --build --preset release
      - name: Test with Release Runtime
        run: |
          PONY_TEST_DEBUGGER="$(.ci-scripts/test-debugger.sh lldb)"
          export PONY_TEST_DEBUGGER
          ctest --preset release -L ci-core
      - name: Send alert on failure
        if: ${{ failure() }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
