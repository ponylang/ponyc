name: "Stress Test: macOS Generative"

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA to test'
        required: true
        type: string
        default: 'main'

permissions:
  packages: read

# Second stress lane. The six existing stress workflows share the repo-wide
# `stress-scheduled` group (one at a time); the generative workflows share their
# own `stress-scheduled-generative` group, so at most one of each lane runs at
# once -- at most two stress workflows in total. Manual runs get a unique group
# (github.run_id) so a branch check never queues behind the loop. Relies on these
# workflows having exactly two triggers (schedule + workflow_dispatch) -- see the
# per-event flag/alert conditions below.
concurrency:
  group: stress-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'scheduled-generative' }}
  cancel-in-progress: false

jobs:
  arm64-macos:
    runs-on: macos-26
    # A bounded soak; the orchestrator also caps each seed with a 120s watchdog.
    timeout-minutes: 90

    name: arm64 macOS generative [debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.sha || 'main' }}
      - name: Restore prebuilt libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
          # schedule -> skip the run on a cache miss (the loop overlaps an empty/
          # refilling cache); manual dispatch -> also pull the branch cache so a
          # branch run finds the libs it already built, and fail loudly otherwise.
          LIBS_CACHE_FLAGS: ${{ github.event_name == 'schedule' && '--skip-on-miss' || '--branch-cache' }}
        run: python3 .ci-scripts/libs-cache/resolve_libs_cache.py --require-cache-hit $LIBS_CACHE_FLAGS --platform arm64-macos-26 --tag "$LIBS_TAG"
      - name: Build Debug Systematic Runtime
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          make configure config=debug use=scheduler_scaling_pthreads,systematic_testing
          make build config=debug
      - name: Run Generative Stress Test
        if: ${{ hashFiles('.libs-cache-miss') == '' }}
        run: |
          python3 test/rt-stress/generative/orchestrate.py \
            --ponyc build/debug-scheduler_scaling_pthreads-systematic_testing/ponyc \
            --use-flags scheduler_scaling_pthreads,systematic_testing \
            --start ${{ github.run_id }} --count 250 \
            --out rt-stress-out
      - name: Upload failure bundles
        if: ${{ failure() && hashFiles('.libs-cache-miss') == '' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: generative-stress-bundles-macos-arm
          path: rt-stress-out/*.json
          if-no-files-found: ignore
      - name: Send alert on failure
        if: ${{ failure() && github.event_name == 'schedule' }}
        uses: zulip/github-actions-zulip/send-message@bd8ec52de371d139ae8313661b7d8318c19266aa
        with:
          api-key: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_API_KEY }}
          email: ${{ secrets.ZULIP_SCHEDULED_JOB_FAILURE_EMAIL }}
          organization-url: 'https://ponylang.zulipchat.com/'
          to: notifications
          type: stream
          topic: ${{ github.repository }} scheduled job failure
          content: ${{ github.server_url}}/${{ github.repository }}/actions/runs/${{ github.run_id }} failed.
