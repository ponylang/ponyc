name: Tools

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '!**/*.md'
      - '!**/*.yml'
      - '!.dockerfiles/**'
      - '!.ci-dockerfiles/**'
      - '!.gitignore'
      - '!.markdownlintignore'
      - '.github/workflows/pr-tools.yml'

concurrency:
  group: pr-tools-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  linux:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: Linux
    container:
      image: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
      options: --user pony
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_IMAGE: ghcr.io/ponylang/ponyc-ci-alpine3.23-builder:20260201
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: make libs-ci llvm_tools=false build_flags=-j4 libs_cache_image="$LIBS_IMAGE" libs_cache_tag="$LIBS_TAG"
      - name: Build
        run: |
          make configure config=debug
          make build config=debug
      - name: Test pony-doc
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        run: make test-pony-lsp config=debug
      - name: Lint pony-lint
        run: make lint-pony-lint config=debug
      - name: Lint pony-doc
        run: make lint-pony-doc config=debug
      - name: Lint pony-lsp
        run: make lint-pony-lsp config=debug

  macos:
    if: github.event.pull_request.draft == false
    runs-on: macos-26

    name: macOS
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('Makefile', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: make libs-ci llvm_tools=false build_flags=-j3 libs_cache_package=arm64-macos-26 libs_cache_tag="$LIBS_TAG"
      - name: Build
        run: |
          make configure arch=armv8 config=debug
          make build config=debug
      - name: Test pony-doc
        run: make test-pony-doc config=debug
      - name: Test pony-lint
        run: make test-pony-lint config=debug
      - name: Test pony-lsp
        run: make test-pony-lsp config=debug

  windows:
    if: github.event.pull_request.draft == false
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh

    name: Windows
    steps:
      - name: Disable Windows Defender
        run: Set-MpPreference -DisableRealtimeMonitoring $true
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Build libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('make.ps1', 'CMakeLists.txt', 'lib/CMakeLists.txt', 'lib/llvm/patches/*') }}
        run: .\make.ps1 -Command libs-ci -LlvmTools false -LibsCachePackage windows-2025-vs2026 -LibsCacheTag $env:LIBS_TAG
      - name: Build
        run: |
          .\make.ps1 -Command configure -Config Debug
          .\make.ps1 -Command build -Config Debug
      - name: Test pony-doc
        run: .\make.ps1 -Command test -Config Debug -TestsToRun pony-doc-tests
      - name: Test pony-lint
        run: .\make.ps1 -Command test -Config Debug -TestsToRun pony-lint-tests
      - name: Test pony-lsp
        run: .\make.ps1 -Command test -Config Debug -TestsToRun pony-lsp-tests
